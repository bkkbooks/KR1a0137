body:
  text: 易經衷論卷上大學士張英撰乾乾卦彖象文言其旨不一而統於健之一言所謂萬物資始乾道變化皆惟至健則能之剛健雖分體用惟剛故健無二理也中正則健之至正而不偏純粹則健之至純而不雜聖人學天而純乎天故曰大明終始君子學天而未能純乎天故曰自强不息此所謂賢希聖聖希天也宋儒曰天地别無所為只是生物春夏則生機達於外秋冬則生機斂於中斂之正所以𤼵之要非至健安能亘古及今生物不息若此之盛也設使天地一日氣化不行則生生之機息而後此將如何接續故曰利貞者性情也作聖配天之業亦法諸此而已矣六爻皆有乾健之徳而所處之位不同故曰六位時乗初九以聖人之徳而隱九二以聖人之徳而見在六爻中地位也故處之而安三四則上下之間進退之際在六爻中人位也人事憂虞之府也故處三而惕處四而疑三則盡乎修已之事故惕四則將舉而措之事業也故疑五與上在六爻中天位也故曰在天然進極必有退盛極必有衰故亢龍繼之也然則聖人且有亢乎堯之言曰予在位七十載汝能庸命巽朕位舜之言曰耄期倦於勤汝惟不怠總朕師皆所以謹亢龍之悔也飛龍在天堯舜之事也見龍在田孔子之事也故繫之曰天下文明其與首出庶物者夫何有大小之别乎終日乾乾夕惕若湯之聖敬日躋文之日昃不遑武之敬勝怠也或躍在淵湯之鳴條武之牧野也合觀湯誓牧誓之言長慮却顧不敢先事而躁不敢後時而退非即其義乎觀乎乾而聖人之道備矣彖辭元亨利貞看來文王繫辭本與諸卦一例如坤即繫曰元亨利牝馬之貞若坤亦作四徳則利牝馬之貞其説難通矣況屯之彖即繼之以元亨利貞亦可謂屯有四徳乎下此而隨而臨而无妄而革皆然若云乾卦與諸卦不一例亦與坤不一例乎況夫子彖傳中未嘗分析為四徳於乾道變化節結之以乃利貞亦未専主四徳也文言乃夫子𤼵揮乾卦之義藴始分為四徳聖人論易旁通不拘曲盡義理正如論射隼于髙墉之上而曰藏器待時論三人行則損一人而曰天地絪緼之例也善乎考亭之言曰有文王之易有孔子之易不必横作主張若就彖釋彖就文言釋文言何六十四卦之不可一例而必為此諸説之紛紛乎故愚論乾之彖終以本義為正而本義於彖傳文言究何嘗不分晰四徳於此更可見本義斟酌之深心矣乾坤有文言而佗卦則間見於繫辭傳上下葢聖人舉乾坤兩卦示人以讀易之法應如此擴充體㑹耳所謂擬之而後言議之而後動擬議以成其變化者此也明乎此則三百八十四爻皆有無窮之藴不獨乾坤兩卦及聖人已𤼵揮之諸爻也乾卦天道也陽道也君道也父道也夫道也聖人之事也坤卦地道也隂道也臣道也子道也婦道也賢者之事也何以明其為天道地道乾曰資始坤曰資生乾曰統天坤曰承天是也何以明其為陽道隂道乾曰龍坤曰牝馬乾曰陽氣潛藏坤曰隂始凝是也何以知其為君道臣道乾曰首出庶物坤曰无成有終是也父與夫從乎君陽類也子與妻從乎臣隂類也何以明其為聖人之事賢人之事乾曰龍徳正中坤曰黄中通理是也惟其為聖賢之事故但繫之以咎悔咎悔者時為之也雖聖人不能無也至于㐫吝之事則無之矣故諸卦有㐫吉之辭而乾坤則無也坤坤之徳可以一言蔽之曰順而已曰化馬之貞曰後得曰主利皆順也安貞吉者以順為正而安之則吉也彖傳釋之一曰乃順承天一曰柔順利貞一曰後順得常文言又申之曰坤道其順乎葢以地之資生雖極其盛大而何一物非天之所為地特代天以成其終耳推之臣道妻道無不如是也陽無所不統隂順以從陽故曰陽大隂小後得主利是也陽無所不行隂止能行於其職分之内故曰陽全隂半西南得朋東北喪朋是也天施生於上而地道有一時之或息則亦不可謂順故曰其動也剛其徳方則坤之健也正其所以為順也隂陽既不可偏廢而聖人必致其扶陽抑隂之意者何哉葢懼其不能常守此陽大隂小陽全隂半之分而失乎順之常理也故獨見其意於初上之二爻葢初防其始而上戒其終始終之義也履霜之漸不謹而龍戰之勢已成小者忘其為小而與大者爭半者不安其半而與全者敵則隂與陽混而莫辨矣故曰隂疑於陽又曰其血𤣥黄則亦如之何哉中四爻二五得中而二為至純惟其純也故不嫌其不順而繫之以直方大之辭三與五以隂居陽故一則曰含章一則曰黄裳欲其含美在中而不失乎坤順之體也六四重隂不中雖未至於窮極然其勢已漸盛故有括囊之戒也合而論之彖與爻詎有二義乎哉地道不順而有龍戰之禍妻道不順而有牝雞之禍臣道不順而有跋扈之禍安得不謹之又謹哉故文言於初六一爻曰非一日之故曰由來者漸曰辨之不早反覆叮嚀聖人之意深矣屯乾坤之後即繼之以屯乾一索而得震故曰剛柔始交坤再索而遇坎故曰難生然萬物始生之時開闢草昧芟夷大難莫急乎震動𤼵越之才然後可以濟屯為亨去險為夷彖所謂不寧象所謂經綸者皆恃此有為之才所謂動乎險中大亨貞者此也内外二卦以震為主震卦三爻以初為主何則震者屯之所以亨初九者震之所以為震也故其繫辭與大彖同卦惟二陽初九既為成卦之主而九五又䧟二隂之中故雖居尊位而不能與初九同功也二以乗初而屯邅三以无與於初而又不中不正故吝六四本隂柔不中以其應初而往吉上以逺乎初而應乎三故有泣血漣如之象屯六爻之義大略如此葢出險濟屯柔弱選懦者不能勝任震之一陽震動於下故有出險之功五以陽而䧟於隂中雖有澤民之心而為小人所蔽錮拯溺亨屯安能望之屯膏之主哉初以其居下也故又有磐桓之象居貞之戒以其為震體長子之象也故曰利建侯凡卦中有震者多曰建侯如豫曰利建侯行師亦此義也卦中六爻初與四應故四有婚媾之義二與五應故二有女子之稱葢以屯繼乾坤之後剛柔始交故婚姻之義於此𤼵端也歟蒙卦本蒙也而大彖所係則皆教人之道葢教正所以廸人之蒙而不終於蒙也曰匪我求童蒙童蒙求我師嚴而後道尊也禮聞來學不聞往教也初筮告再三凟凟則不告求者誠而後應不誠則不應也凡此皆教之正故利也我指二童蒙指五何以明其然也於彖傳而知之曰志應者諸爻惟五稱童蒙五與二應又曰以剛中則知受教者為五而教人者為二卦惟二陽而二能教上不能教者二得中而上不得中也初六以隂居初質雖柔弱而嗜欲未深天性未漓又比於九二故有𤼵蒙之益六五以柔居尊下應九二純一不雜故有童蒙之吉六四逺二而應初故有困蒙之吝六三以隂乗陽不中不正故並不可以蒙稱而鄙之以見金夫不有躬之女深絶之之辭也其絶之者何也謂其以柔乗剛失求益之道故曰行不順也上九過剛居上安能益人惟可自守而已故曰擊蒙禦冦其與包蒙之循循善誘者不大相逕庭哉觀屯卦初九以剛正為一卦之主蒙卦九二以剛中為一卦之主然則拯溺亨屯與夫施教迪蒙俱不可無陽剛之徳而中正又其要領也歟人當蒙之時天機深而嗜欲淺此時導之善則善導之惡則惡教之所以宜預也養之以正則作聖之功即在童蒙之始家人之閑亦在初象所謂志未變者正在此時也六爻二陽爻乃施教者四隂爻乃受教者初居蒙之始天理渾全故曰發蒙五居上之中虚心聴受故曰吉三四兩爻嗜欲勝而蔽錮深非初非應無受教之地故聖人之所不與也需險在前而震動以臨之則有濟屯之功險在前而剛健以處之則有不䧟之義易之重陽剛也如是夫濟險在乎有為待險者在乎有守有為有守均非剛者不能也故外險内健曰需六爻以九五一爻為主彖辭所謂有孚彖傳所謂位乎天位以正中者皆謂此也故他爻或言終吉而此爻則言吉謂其處險而能需是以不至於䧟也乾三爻有坎在前疑於䧟矣然以其健也故需于郊需于沙需于泥而不至于䧟也坎體二隂爻一則需于血一則入于穴近於䧟矣尚以其能需也故有出自穴不速之客三人來之象總之處險而能需需而有孚則皆可以得吉也有孚者二五剛中之象也天下事有宜需者冒進則䧟矣故六爻多危辭也需者飲食之道乃卦中一義大象序卦言之合觀全爻及彖辭則主需待之義為多也夫需者事之賊也聖人何取於需哉為其險在前也險既在前而乾又以剛健之才臨之能無䧟於險乎故卦名為需而彖爻皆言需聖人告人以遇險之道也吕東萊曰凡事迴翔審顧終是少錯故需卦六爻言无咎者一言貞吉者一言終吉者二其二爻不言吉㐫而象繫之曰敬慎不敗曰順以聴可以識需之意矣訟險且健訟之才也故上健下險為訟以二人言之則上健而下險此險而彼健以一人言之則内險而外健皆致訟之道也有孚窒誠積於中而不得逹也然而不可不敬也故又曰惕中吉然而訟不可成也故又曰終凶遇中正之人以聴訟則利飾虚誕之辭以搆訟則不利故曰利見大人不利涉大川只此數語而訟之曲折盡矣由此觀之非有孚不可以訟非窒不可以訟非愓中不可以訟非見大人不可以訟猶且終之則凶涉大川則不利敬慎如此而訟亦庶乎罕矣作事謀始尤聖人杜訟之端絶訟之萌而使民無訟之盛心也六爻中九五一爻陽剛中正而居尊位乃聴訟之主而餘五爻則皆訟者也凡剛者健訟而柔者不能訟故初六不永所事六三食舊徳皆不終訟者也九二九四陽剛也本宜訟而以其居柔故皆曰不克訟信乎訟之不宜於健也惟上九以剛居訟極而又乗九五故有錫鞶帶而三褫之象言勝而受服且不足敬況其未必勝乎聖人之戒人訟於彖見之又於爻見之六爻之中一曰不永所事二曰不克訟一曰食舊徳一曰終朝三褫之反覆叮嚀之意始終一無訟之心而已矣凡天下事不過始中終三者而已彖辭曰惕中吉終凶而大象復推原之於謀始誠能慎之於始則可以不至於訟又何必言中吉終㐫乎此聖人敎人止訟之道一語盡之矣師師以一陽居下之中而統衆將帥之象也故曰師六五以柔居上之中而下應九二是人君以謙柔有孚之徳而信任乎剛中之將非師之善者乎曰貞師出貴以正也丈人吉擇將貴以徳也既曰吉又曰无咎必吉而後始无咎也彖傳曰行險曰毒天下聖人敢輕言師哉兵凶器也戰危事也師之所過荆棘生焉火炎崑岡玉石俱焚夫殺掠淫暴横征急斂無不由之當其時則有鋒鏑死亡之憂迨其後猶有水旱疾疫之應談者變色聞者驚魂古人為兵端者鮮不遭奇禍人臣敢以此進説於其君哉淮南王諫伐閩越賈捐之論棄珠崖蘇軾諌用兵書皆可謂痛切言之者也以六爻言之初言師出以律葢師以紀律為本而律當嚴之於初失律於初而其後未有不致敗者九二將帥之象以剛居柔而得中上應九二有剛明之將略臨事而懼是居柔也好謀而成是得中也閫以外將軍制之君不與馬得應與也此所以吉而无咎也六五命將之君敵至而應故有田禽利執之象然任之當與不當惟在六五而已其惟長子歟其為弟子歟皆未可定也故他爻分見而此爻兼之六三以柔居剛才弱而任重輿尸宜矣六四以柔居柔自審才弱而寧退䖏於無功其過六三逺矣上六用師之終開國承家之時也聖人念前此用兵之禍痛心疾首其端未有不由于小人今幸而削平則有國有家之人尚可用小人以啓禍亂之源乎象明言小人勿用必亂邦也由亂而後用師因師而念亂本故於終爻言之此正欲絶其用師之由也既濟亦曰髙宗伐鬼方三年克之小人勿用言靖亂如此之難以深戒小人之當逺朱子本義謂但可以優以金帛而不可以封爵土謂用兵之時則小人尚或可用豈聖人於師終垂戒之意哉師之卦有四善焉一陽得中而衆隂從之以剛明之將而率用命之旅一善也二五相承而上柔下剛以虚已之君而専委任之責二善也卦徳内險外順以荷戈死綏之險而出之以和順三善也卦體水在地中以伍兩卒旅之制而用之於農戰四善也兼此四善不愧為王者之師矣比比以九五一陽居尊得中而上下五隂比之人君親附天下之象也原筮非再筮也自考有元永貞之徳而後可以吉而无咎也人君以聖徳為天下所附廣大無私絶無羈縻羅致之權故九五獨有失禽不誡之象此所以為比之顯也元永貞无咎指九五也不寧方來指初二四也後夫㓙指三上也五以顯比之君崛然而興比之初者最吉所謂豐沛從龍之佐髙祖之良平光武之鄧耿也能始終不渝則功建名立有分茅胙土之榮無鳥盡弓藏之慮何也以其誠也故曰終來有他吉二以柔正應五四以柔正比五二在内卦之中故曰比之自内四在外卦之下故曰比之自外或為股肱心膂或為宣力禦侮此皆得所比而吉者然利於貞則同也天下已歸於一君而上六獨以隂柔之資居人位之外乗五乗剛傲然負固此正所謂後夫凶髙祖之田横光武之公孫述也雖欲折節而亦後矣其能有終乎衆隂皆比於五獨六三不正不中應乎隂柔失位之上爻是不知天命人心所歸而失所比之主也范增之從項羽王猛之從苻堅是矣能無比之匪人之傷乎比六爻之大義明顯如此君之託於臣民之上猶地之託於水也故以其親比無間言之則謂之比水地比是也先王象之以建侯以其臨御最切言之則謂之臨地澤臨是也先王象之以撫衆以其容蓄無迹言之則謂之師地水師是也先王象之以行師以其儲備不虞言之則謂之萃澤地萃是也先王象之以治戎聖人之觀象命義豈不精且確哉小畜小畜巽隂在上乾陽在下為其所畜又以六四一隂畜上下之五陽是之謂小畜夫以一隂而畜衆陽則畜之為力亦薄如雲生於西不能成雨故有密雲不雨之象猶幸其陽剛居中得位故曰亨密雲不雨自我西郊皆幸之之辭也小人之勢未盛君子猶有可上逹之機故彖辭曰尚往者為陽言之也曰施未行者為隂言之也柔得位而上下應之曰小畜其殆聖人之危辭乎聖人扶陽抑隂之意凡陽得上進皆謂之復故初二兩爻皆逺乎隂而不為其所畜故初曰復自道何其吉二曰牽復吉二爻獨言吉者以其逺乎隂而比乎陽也三則迫近於隂為其所畜而不能行故有輿説輹之象雖志剛而與之爭亦何益哉四一隂也安能畜止衆陽則以上二陽為之助也葢同為巽體故也五與四比故兩爻皆曰有孚兩爻之象一則曰上合志一則曰不獨富葢九五居中處尊而獨與六四同力畜陽是小人居尊而又有大君之助所以一隂而衆陽咸聴其畜也既有九五之助至上九則畜之勢成故此爻之辭繁而不殺曰既雨者則非密雲不雨之象矣曰既處者則非尚往之時矣又曰尚徳載婦貞厲月㡬望皆隂畜陽而至於極盛也夫上九本陽爻也而所繫之辭則皆純隂葢以其為巽之體畜之極故陽亦且變而為隂矣當此之時君子尚能有所往哉直斷之曰征凶而聖人至此亦且無如之何矣小畜之時以一隂畜衆陽以一小人制衆君子之時也初二二爻一以剛而得正一以剛而得中故皆不為所畜而吉至三則為所畜矣畜衆陽者六四一隂也不應此爻反得无咎愚見以一小人制衆君子傷害憂懼決不能免聖人不欲絶之而戒之曰必有孚而後傷害可免憂虞可去而得无咎不然則有咎矣為小人開遷善之門正如否之初爻剝之五爻是也此三爻皆以小人傷君子故繫之之辭同若九五之有孚攣如富以其隣正以其居尊而與六四同力畜乾為可醜故不繫之以吉與无咎之辭而統以征凶係於上九之下也安得謂此二爻獨美乎觀上爻所言尚徳載正以五上皆助四畜乾故咎其防之不早耳則不得謂四五兩爻為美也明矣況本義之釋二爻亦未嘗有予辭也俗説在乾三爻則目之為君子在巽三爻則又目之為强暴注疏本義絶無此説雖易義變動不拘亦不應六爻之中别異如此故所當略之也履乾至健者也兌至柔者也剛在前而柔在後是至柔躡至剛之跡而進故有履虎尾之象又以其柔也故處險而不危有不咥人之象九五一卦之尊位也剛明而中正履尊位之道莫大乎是故彖辭特持以明之上天下澤名分不可踰越者禮也禮者人之所履此自是卦中一義而彖爻所主則専在剛柔也爻以踐履為義以剛柔相濟為善六爻之中有剛履剛者焉有剛履柔者焉有柔履剛者焉以剛履柔者是以剛明强健之徳而出之以謙沖巽抑之節履之最吉者也故九二履道坦坦幽人貞吉九四愬愬終吉上九視履考祥其旋元吉也以剛履剛者有過剛之慮故初九必素履往而後无咎九五則夬履貞厲也以柔履剛者則以隂柔之才而行乎剛健之事不中不正故有履虎尾咥人凶武人為于大君之象本義擬之於秦政項籍葢以多欲之人而行强暴之事正所謂以柔履剛也凶也必矣九四獨言愬愬言終吉者葢以其近五而多懼又不中不正之故也九二得中故獨貞吉上九有終故獨元吉也全卦因九五一爻剛中而致亨在九五之自為則有夬履貞厲之戒故彖與爻不嫌異辭耳人之涉世憂危險阻猜嫌疑畏其不測也甚於江湖其巉絶也險於太行孟門故易有履虎尾之喻況人君之位尊勢重合天下之聰明才智詐巧勇力無不欲投之於一人徳則我后不徳則我讐故彖辭特舉履天位以言之明人之履世固難而履帝位者尤難以九五之陽剛中正而猶不能無夬履之厲則三聖人係履之意危且切矣泰易以上為往下為來外為往内為來陽剛來而居内則治隂柔來而居内則亂故泰否二卦獨主往來大小之義而彖辭則推廣於天地上下之交葢天之於地君之於臣民朝之於野一日不交則壅蔽隔塞其患有不可勝言者要之泰與否之闗亦止在君子小人消長之機而已非長則消非消則長不可中立之勢也卦中初九一爻拔茅連茹正以言君子道長之由為致泰之本也九二六五相應下有仁勇無私之大臣上有虚已任賢之明君此卦之所以為泰也雖然天運循環之理致泰難而保泰尤不易故九三之无平不陂六四之翩翩而來上六之城復于隍泰曾㡬時而否即因之吁寧不可戒之至哉葢以陽極則隂生冶極則亂生必然之理所謂其孚也君子當此之時惟持之以艱貞則泰而不至於否治而不入於亂兢兢守之猶懼或失況敢恃泰而侈縱乎故警惕於九三一爻隂陽相際之時聖人之意深矣泰卦六爻初爻言陽剛在下之賢乗時而彚進九二剛中之臣六五柔中之君君臣相應剛柔得中所以致泰故本義曰主乎泰曰泰之主葢以此也九三六四隂陽之交天地之際上六又否泰之闗故三爻皆言泰之必不能不否而皇皇憂懼於滿盛之時周公𤼵其義曰艱貞无咎勿恤其孚所以示人以保泰之道非徒憂懼而已也否反泰為否但在一消長之間耳故曰否泰反其類也否之初六所謂拔茅連茹正小人彚進之始而卦之所為否也泰之初九曰征吉則此宜言征凶而反曰貞吉亨者何也葢聖人無絶人之心彼小人能反其為惡之才而翻然從正則何不可返否為泰而吉且亨哉惟其自私自利之心深則不得不使妨賢病國之計巧故象但望其志在君則安有不翻然改圖之理乎於六二之包承則又繫之以小人吉者尤望其包承乎君子而自免危亡之禍則亦何嘗不吉也至六三則隂柔不中不正居下之上聖人屬望小人之念亦㡬乎絶矣故醜之曰包羞小人雖外貌侈然自得而中心韞藏實有無窮羞愧可恥之事故聖人以包羞二字形容之所謂如見其肺肝然也九四則隂轉而之陽一陽動而諸陽從之故曰疇離祉休否傾否皆大人之事當六二則大人否亨至此則否去泰來大人可以出而圖事故曰大人吉也初二之言貞吉亨小人吉者所以開小人自新之門五上之言大人吉先否後喜者所以耑大人撥亂之責聖人兢兢焉反否為泰之心固如是夫易於泰則三爻言否恐人之恃乎泰而示之以將否之防也於否則三爻言泰恐人之諉乎否而示以致泰之道也此其所以為聖賢之書也若但以一治一亂委之自然之天運則豈聖人作易之旨哉易有為君子謀者焉亦有為小人謀者焉否之初六貞吉亨六二包承小人吉皆所以為小人謀也雖為小人謀而究之為君子謀而已矣君子小人其勢皆不能獨進君子有君子之朋小人亦有小人之黨故否泰初爻皆有拔茅連茹之象在君子則可幸在小人則尤可畏也夫同人同人大有皆從二五一隂取義一隂在二而上下五陽皆同與之故曰同人一隂在五而上下五陽皆為所有故曰大有同人之理宜公而不宜私故曰于野從正而不從邪故曰利貞天下之人不同而志則同天下之志不同而正則同故曰惟君子為能通天下之志通以正也卦之所以善者亦以二五中正起義也彖傳以六二為成卦之主繫之曰柔得位得中而應乎乾曰同人是卦之善者莫若此爻矣而爻辭獨繫之曰同人于宗吝何卦爻之不合也向竊疑之因觀履卦彖辭曰剛中正履帝位而不疚光明也爻辭則曰夬履貞厲然後知彖與爻不必盡合彖之贊之者因此爻而為全卦之善合觀六爻而言之也爻之戒之者即此爻而言其位與應之未善専一爻而言之也故不嫌其異辭也與人同者以廣大無所私與為善以狹小有所係累為不善故于野則繫之以亨于門則繫之以无咎于郊則繫之以无悔六爻惟二有所應故獨繫之以同人于宗吝也二與五本為正應志欲相同而三四間之猶噬嗑之有間也如君子本欲與君子同而小人居中間之君臣本欲相同而讒夫居中間之君民本欲相同而盜賊居中間之故二爻有伏莽乗墉之象三以剛居剛故三嵗不興而不知悔也四以剛居柔故雖乗墉又以弗克攻而吉也九五之先號咷而後笑者為此故也大師之克克三四也既克而相遇者遇乎二也非竭剛猛之力其能有濟乎初上處乎事外而無與乎二五之交故獨得无悔於此求之同人之義亦可以明晰無疑矣大有大有者豐亨大有之時也卦徳文明而剛健明則足以别擇邪正剛則足以果斷力行卦體五爻皆陽當陽剛盛長之時一隂居尊是人君有柔順謙沖之徳而下應乎九二剛健中正之臣又六五為文明之主而應乎乾之中爻謂之應天是有君有臣天與人歸其為大有元亨也復何疑哉以六爻言之六五一爻為成卦之主而五陽皆應是以有厥孚交如之慶以其柔也而居大有之時恐其溺於豐亨躭於逸樂故又曰威如吉九二以陽剛居下之中上應六五正國家倚毗之人以其剛中故徳望隆重能措天下於泰山磐石之安故有大車以載之象六五賢君能虚中以任之此世之所以大有而元亨也但大有之時舉朝之人易致宴安而忘戒懼故初九剛而居下始仕之臣也則曰无交害又曰艱則无咎九三重剛得正公侯之臣也則曰亨于天子而有小人弗克之戒九四剛而居柔近君之臣也則曰匪其彭无咎自初至五兢兢乎多危辭焉豈非大有之不易居而君臣上下皆當慄慄警懼以常保此盛乎上九處事之外而能以陽剛下從六五之君是即所謂思順尚賢也宜其上吉而受天之祐歟謙謙者有而不居之義山至髙也地至卑也以至髙而處於至卑之下謙之象也又艮靜也坤順也内靜止而外柔順謙之義也君子有終者謙之為道始則卑而終則光也又謙者虧欠之義故彖傳言謙對盈而言不對驕而言言盈而驕在其中矣古人言謙多與滿對書曰滿招損謙受益是也葢器大於所受謂之謙受溢於其器謂之滿不専在驕伐卑巽也甚矣易之善言謙也以天道地道人道鬼神之所尚總不外於一謙又曰日中則昃月盈則食天地盈虚與時消息天地不能常盈而況於人乎聖人於此實見其理之不可易而不啻其反覆諄切言之也以六爻論之内卦三爻艮靜而止也故皆言吉外卦三爻坤順也故皆言利卦中五隂一陽以九三一爻為成卦之主為衆所歸剛正能謙故獨曰勞謙而用全彖之辭焉葢陽剛而謙為難有勞而謙為尤難故曰萬民服也深與之之辭也又五隂衆象九三一陽統之與師所分止在二三之一位耳故五則利用侵伐上則利用行師葢謙至於五上謙之至矣猶有不服則不得不用師以治之不然侵伐行師豈謙主所尚哉葢易中最貴者謙六五以柔居尊而卦體又謙聖人懼其過於柔而以利用侵伐濟之亦以剛濟柔之道也易以道隂陽故於晝夜鬼神幽明之故詳乎其言之矣察乎天地四時之變日月之盈虚而知鬼神人事消長之機盛則必衰滿則必損暢發於謙之彖辭真一語而抉天地之奥也豫雷出於地則陽氣上通而無所結滯故為豫下順上動順以動動而順皆豫之義也豫有和豫逸豫二義卦主和豫故以天地聖人為言爻主逸豫故有鳴豫旴豫㝠豫之失卦中惟九四一陽為成卦之主故曰由豫言諸爻由之而得豫也五隂衆象也而從乎一陽故曰朋盍簮豫最足以溺人況諸爻皆以隂柔之資而乏陽剛之質惟六二得中得正不溺於豫故此爻獨不言豫然非有堅操確守烏能當衆豫之時而獨有介石之貞乎惟其操守堅定故見㡬明决而獨超然於恒情之外當豫而不溺也初之鳴豫不勝其豫而以自鳴其得意也三之旴豫志慕乎豫而畔援歆羨也五之貞疾沉溺於豫而嗜欲深錮也上之㝠豫昬㝠於豫而不知止息也是皆柔而不得其正故處安樂而陷溺不知席豐履泰之難而紛紛若此也諸爻皆無應與獨初六一隂在下小人之尤而上應由豫之主以隂柔而得强援侈然自大不復有悔悟之萌故獨得凶也然則處豫之道豈不難哉聖人繫豫卦深念其處之之難九四公其豫於人以天下之樂為樂故曰由豫有得六二柔中且正不以世俗之樂為樂故獨曰貞吉其他得意而鳴豫躭戀而旴豫宴安而貞疾昬柔而㝠豫鮮不亡矣當豫之時而居尊位惟剛足以克己健足以制欲乃六五以柔處之而又不正故宜其溺於豫而有貞疾之象也初以應四而凶三五皆比乎四上處豫極惟六二不涉乎四故獨得貞吉坤衆象也有衆則必爭故坤之上則為龍戰坤在坎上則為師謙之五上亦曰侵伐曰行師又坤土也分土之義莫大於建侯故師之上曰開國承家比之象曰建萬國親諸侯豫兼此二義故曰利建侯行師則又以震能以貴下賤亦有建侯之義也所謂言天下之至賾而不可厭者此也九四以陽剛居近君之位而上下歸之六五柔而見逼僅存空名而已故曰貞疾恒不死處豫之道以速悟為善遲則為所沉溺而不能出矣故六二之不終日則貞吉六三之遲則有悔也隨隨者取説而動為從於人之義也隨之義無所不包下之從上臣之從君人之求友皆隨也彖以人隨為義故曰天下隨之爻以隨人為義故曰出門交有功此本末之分也人之隨人審之於始而不失其所宗則功建名立而可以无咎不審之於始而失身匪人則身敗名辱而終於無成雖欲棄而從君子之交亦不能矣故象曰弗兼與誠慎之也以六爻言之大抵隂柔不能獨立必依於陽以自立故卦中三隂爻皆有所係二係於初三係於四上係於五其中得失分焉九五以陽剛居尊位為一卦之主衆爻之所當隨者也故他爻或言係或言隨或言交而此爻獨曰孚于嘉吉明其以誠信中正致人之隨而嘉且吉也六二本應五而比初又以其隂柔躁急不能舍近而就逺故隨初而有係小子之失三比四而隨四四以陽居上較初為得位故曰丈夫上六比五正交孚之至者故拘係從維而吉也此隂從陽之義也又以三陽爻言之初逺乎五故勉之以出門之交言宜上交乎五也四曰隨有獲言隨五則有得若自以為貞則凶也此又言二陽之當擇所従也中人之才因所隨而變者多矣古人曰入芝蘭之室久而不知其芳則與之俱化也人之擇友安可不致謹於小子丈夫之辨士之擇主安可不明於出門之交君之擇臣安可不明於孚嘉之義故曰隨之時義大矣哉易但言貞吉未有言貞凶者九四以陽剛居近君之位雖貞猶不免於凶況不正乎聖人之戒之者深矣蠱蠱者壊也壊極而有事是整頓飾治之時也亦猶否之極則泰也艮之體剛巽之體柔艮在上而巽在下是上有髙亢之君而下有柔順之臣艮之徳止巽之徳巽止在上而巽在下是上有懐安苟且之君而下有卑巽謟䛕之臣此世之所以蠱也卦為蠱而卦中彖爻所言則皆治蠱之事知其蠱而治之則元亨矣夫整理前人已墜之緒過剛則更張無漸近於彰父之過過柔則怯懦無成終於墜父之業人子處此最難惟剛柔相濟者為善初六以柔居剛故雖厲而終吉九二以剛居柔而上應乎五故有不可貞之戒九三則以剛居剛故有悔然以其剛也奮激有為雖不得中而尚能起衰振靡可以无大咎六四則以柔居柔寛裕悠緩深非治蠱所宜故往見吝也六五以柔居剛而又得中故有幹蠱用譽之吉此五爻剛柔之分而幹蠱之所以得失也下五爻皆言子道上九一陽居尊有父道焉下有幹蠱之子則為之父者可以無所事事所謂考无咎也故上九有不事王侯髙尚其事之象又五爻皆取象於子而上九一爻獨取象於臣者何也葢上處事外在朝廷有事外之臣而家庭無事外之子故變子道而言臣道以明臣子之一理則下五爻雖不言臣而為臣幹蠱之道亦於此可類觀矣先甲三日後甲三日本義以先甲為辛後甲為丁取更新於前丁寧於後注疏深闢此説程傳亦不主此解但言甲者事之端也三日者反覆之義也反覆以慎審於事端之先持重於事端之後與先庚三日後庚三日同義庚者事之更也故亦宜慎審持重如此其説本王輔嗣較本義則程説為獨得也先甲三日後甲三日一卦六爻之義也周而復始則為七故曰七日來復勿逐七日得也自初以至五治蠱之道盡而蠱皆去矣臣子於此當逺引髙蹈以全其身葢以子而幹父之蠱其心必有所未安況以臣而幹君之蠱其名尤有所難受如伊尹之復政厥辟周公之復辟明農皆得上九之義即書所謂不以寵利居成功之謂也霍博陸亦可謂幹蠱之臣而溺於權寵僅免其身禍延於宗殆不明於上九之義者夫臨臨大也一陽為復二陽為臨至三陽則為泰矣剛浸而長非始盛之時乎當始盛而慮衰故曰至于八月有凶葢至於遯則六爻皆變矣君子之道辨之於早慮之於微不待泰而後否故於臨言之也大象六爻皆言臨御之義即中庸之有臨論語之臨民故以教思容保言之卦爻中初無凌逼之義不若以剛長釋臨之為確也六爻中六五一爻下應九二是以柔中虚已之君而任剛明中直之臣不自用而用人故曰知臨大君之宜則此一爻為臨卦之主也明矣六爻皆有臨人之義大約中正則吉初以剛而得正二以剛而得中故皆言吉四與上以柔而得正故皆言无咎惟六三隂柔不中不正故有甘臨之象甘者違道干譽驩虞小惠非大君臨人之體然亦不類於殘忍苛刻之所為故曰既憂之亦可无咎也然則臨人之道已柔而得正得中與剛為應者是任賢以圖治也知臨與至臨是也已剛而得中得正與柔為應者以柔道克剛也二咸臨是也雖無陽剛之應而已柔得正者和惠之治也敦臨是也已柔而不中不正復與隂柔相應者委靡之治也甘臨是也詳觀六爻之義而臨人之道思過半矣咸程傳釋感也注疏皆從此義以初與四為正應二與五為正應隂陽有相感之理故二爻皆曰咸臨三與上無應故獨曰甘臨本義釋咸為皆謂二陽遍臨乎四隂則於六五一爻說有所難通故不若程傳注疏之確也八月有凶必主本義之前說為正從復至遯自子至未本周正八月若云從臨至遯歴八爻則八月之義無所據諸說聚訟要當以考亭為斷耳觀以上示下謂之觀以下視上謂之觀二陽居尊在上而衆隂仰之觀之義也在卦惟取觀示之義故曰大觀在上懸象以觀示下土者莫如天之四時故特舉天道以明之在爻則取觀見之義故諸爻各因位以立言觀示天下莫大乎恭静而端嚴如見大賔如承大祭人惟當盥而未薦之時誠意敦篤敬慎不妄故曰有孚顒若也程傳言既薦之後則人心散而精意不如始盥之時本義論不薦又謂致其潔清而不輕自用愚謂不薦只宜言盥手未薦之時此時氣象必精誠純潔人主欲為觀於天下亦以此而已矣彖所謂下觀而化神道設教正以此也六爻則以觀之逺近為所觀之淺深初六六二皆以隂柔而居下故有童觀闚觀之象惟六三處上下之間進退之際故不觀人而自觀至六四則近乎五矣柔而得正觀之最為親切故曰觀國之光九五上九皆曰君子明乎徳位兼隆為衆隂之所仰也既為世之所觀則反觀不得不嚴故必觀我生觀其生皆不愧為君子而後得无咎也九五得位故曰觀民上九无位故曰志未平未平者所遭之時如此不可忘戒懼也有徳有位者觀乎人上行而下效也有徳無位者觀乎已反躬以自省也在下者觀人在上者自觀已仕者觀人將仕者自觀然則何人不宜觀哉三之觀我生對上而言也所謂内度其身也五之觀我生對民而言也所謂皇建有極也上之觀其生無所對而言獨善其身之道也卦取觀示爻取觀見本末之義也與比隨之義同也噬嗑頤中有物此噬嗑之象也震動離明動以威之明以照之威明並用折獄之道莫大於此非威無以警不率非明無以察覆盆故全卦之象皆言用獄之事噬嗑者齧而合之也頤以養生噬嗑以去間取象如此亦奇矣初上為受刑之人故有屢校何校之象初則罪薄過小故猶可因懲戒而自新上則罪大惡極故入於罪戾而不能自振滅趾猶可滅耳之凶不可道也中四爻則唯取噬嗑之義六二以柔居柔故曰噬膚六三以柔居剛九四以剛居柔六五以柔居剛故有噬腊肉乾胏乾肉之象然皆得无咎者當噬嗑之時而噬嗑之人有不順於教利用刑人君子以明體而動威之何咎之有六二得中故有噬膚之易以其過柔而乗剛故又有滅鼻之傷六三隂柔不中不正故遇毒四爻之中九四獨以剛居柔剛能折獄柔能察情故此爻獨吉六五尊位以柔居剛亦非純乎柔者故亦足以折獄而无咎四爻皆有戒辭者慎刑之心無時而不然也中四爻下二爻震體也用威以懾之而人多不服故有滅鼻遇毒之傷上二爻離體也用明以照之故人無不樂輸其誠而有金矢黄金之得然猶恐恃其明而樂於自用則哀矜之意寡而人之情有未能盡得者矣故又戒之以艱貞貞厲也九四大臣之位大臣有折獄之責而守天子之法在乎剛而不過此執法之義也六五居人君之位大君聴天下之獄當時存矜恤之心在乎柔而得中此好生之仁也各以其所居之位而異辭也明固無所不照而於治獄猶宜故火雷噬嗑専言治獄之事也山火賁亦曰无敢折獄雷動而艮止故曰无敢也賁賁者文飾之謂也剛柔相錯而後文生焉下卦本乾剛也而柔來文之上卦本坤柔也而分下之剛以文之曰來曰分曰上則二卦之體可見矣粲然相接之謂文秩然不紊之謂止皆為賁飾之象柔來文剛是以剛為主而柔為輔故亨剛上文柔是以柔為主而剛為輔故小利有攸往天文莫大於隂陽剛柔交錯是也人文莫大於倫序文明以止是也下三爻離之體以文明為主故初則賁其趾謂足於己而無待於外也二則賁其須隂不能自賁而待賁於陽故曰與上興也三則明體之極故曰賁如濡如然恐其傷於文而無實故戒以永貞吉也上三爻艮體以篤實為主故四曰皤如又曰白馬五曰丘園又曰戔戔上曰白賁皆文而返質之象至於白賁而返乎太素矣彖所謂文明以止也賁卦本以文飾為義然非質不立非文不行故内三爻言文外三象言質内外相賁之義也趾取在下之義初陽也須取附物而動之義隂麗於陽也隂陽必相雜而成文剛柔必相錯而成文六爻之中初與四相應而成賁者也故初賁趾文在下而四翰如以從之上求下也二與三相比而成賁者也故三濡如文在上而二賁須以從之下従上也皆陽従隂之義也上與五亦相比而成賁上白賁而五丘園皆以質為文故二爻之辭相類也柔來文剛剛上文柔義實如此剝以五方盛之隂而剝一將盡之陽則陽之勢微矣剝與復之名卦皆従一陽得名以陽之方來而為復以陽之將盡而為剝故曰易為君子謀於剝而危之於復而幸之也處剝之時君子道消小人道長惟有順而止之斯合於天道之虚盈故曰不利有攸往初六六二六四皆剝陽者也皆曰剝牀而有逺近之不同初曰剝牀以足二曰剝牀以辨四曰剝牀以膚剝至於膚剝之至矣易窮則變變則通故五雖隂而不更言剝也六三居羣隂之中而獨與孤弱之一陽相應是自剝其黨與以従於正君子進之六五以一隂為衆隂之長而切近於陽君子望其帥諸隂以従陽而至此更不言剝也葢陽剛之氣所以維持世運不可一日無羣隂之中苟有稍能助正者君子皆不欲拒絶之而使之入於惡人之黨故於三五皆開其自新之路而於初二又示以蔑正之戒至六四重隂不中而又無應與與陽相剝始直命之曰凶不然一陽孤立之時能當羣隂之盡剝哉上九之一陽即復初之一陽也天地生生之理憑之故曰碩果世道人心之機賴之故曰輿曰廬此時君子有扶陽之心而正氣日長従此而復而臨而泰以至於乾皆自此始也故曰得輿此時小人有抑陽之心而正氣日消従此而姤而遯而否以至於坤皆自此始也故曰剝廬斯固君子之禍也亦豈小人之福乎剝未有不始於下者足寒則傷心民病則傷國根本撥則枝葉盡羣隂在下則一陽為其所剝聖人觀象於此而於隂陽消息之外而又發一厚下安宅之義所以去危而即安治剝之道也觀碩果之辭而知聖人之愛君子觀貫魚之辭而知聖人之不絶小人然後知君子處剝之時而絶惡過嚴者其不為小人所中而至於消亡者㡬希矣復復者陽雖孤處方盛之時隂雖衆處將退之時而且震動於下坤順於上動而以順行故為復也彖辭言氣化之消息爻辭言人事之得失氣化以人事為轉移也復者天地隂陽之候人心善惡之機循環而不已者也微復則天人之理㡬息矣在天地為冬至一陽之候在人心為平旦之氣其好惡與人相去也者㡬希但天地無往而不返之時故以七日來復為期所以復而亨也人心有失而不返之理故以十年不克為戒所以不逺復而吉迷復而凶也六爻以初陽為主不逺復為元吉終不復為最凶二五得中故一則休復而吉一則敦復而无悔也六四處羣隂之中獨與初應是特立獨行之士也故曰中行獨復惟六三隂柔不中不正而上應上六故有頻復之厲然以其近陽而知復也故雖厲而无悔惟迷復終凶而其餘五爻則皆善盖人心一動於善則前此之過日損後此之善日増况震居動體初陽在下尤有泉逹火然之勢從此充而長之其可得而禦乎觀於復而知聖人之不重無過而重改過也如是夫卦象卦體惟復最精一陽生于羣隂之下此卦體也雷在地中陽氣奮於下其勢必上此卦象也古人之命名亦精矣自乾之後一隂始生而為姤陽日趨於微隂日趨於盛厯六卦而為坤至此一陽始生故曰七日來復凡隂陽之消長皆以六為數故自冬至至夏至自夏至至冬至各六月而卦之爻亦盡于六以隂陽之消長為數也動於下而順於上為復天理以順而長之也不能順則天理遏絶矣動於下而止於上為頤人欲以逆而制之也不能止則人欲横流矣此道心人心之别動心忍性之義也凡懲忿窒慾非勇不能初以陽居陽剛徳之最鋭者也故得元吉二以近剛而吉四以應剛而善五以柔居剛而吉三雖無與於陽而亦以其居剛也而得无咎惟上六逺隔乎陽爻位皆隂䧟溺深而絶無發奮之望謂之迷也不亦宜乎復有五等復之最初者善也不逺復是也復之始終不渝者善也敦復是也資于人以為復者亦善也休復是也處流俗之中而克自振奮者亦善也中行獨復是也見之不真守之不固或得或喪者猶可兾其至于善也頻復是也至迷復而始不可道矣復有六爻而聖人許之者多絶之者少所以廣遷善之途也夫易中兩言仁體仁長人乾之仁也中心安仁之謂也不逺復為仁復之仁也克己復禮之謂也聖人言仁兩端而已矣无妄動以人則為偽動以天則為誠故震下乾上謂之无妄彖曰天之命又曰天命不祐葢以此也天之發生萬物一无妄之理也先王法此以對時育物亦惟其誠而已人之初念鮮有不誠者人能率初念以往無不獲吉故初九直謂之无妄葢以其為成卦之主也六二之柔中九五之剛中皆无妄之至者故曰不耕穫不菑畬曰勿藥是惟順乎天理之自然而無一毫人欲之私者也六三以柔居剛雖无妄而有災九四以剛居柔僅可貞而无咎上九之𤯝則以窮而致災嘗竊疑无妄之誠中孚之信至上爻皆不吉者何也言必信行必果大人弗為易窮則變變則通故泰極而為否否極而為泰乾之窮為无龍坤之窮為龍戰皆此義也故无妄初吉而終窮也又以二體言之下體震動此无妄而利於動者也故初曰往吉二曰利有攸往三曰行人之得上體乾健九四與下二爻互體成艮此无妄而利於靜者也故四曰可貞五曰勿藥上曰行有𤯝此又上下二卦動止之分也人之修身不能無動於得喪之來然方其為己而預有一計功避害之心即妄矣天下原有不期然而然之福所謂不耕穫不菑畬者是也天下亦有不期然而然之禍所謂行人得牛邑人之災无妄之疾是也君子知天下原有此不期然而然者一切聴之于自然而不以紛擾其純誠精一之心則所謂无妄者乃真无妄也故聖人獨於此卦發之也无妄之上爻即乾之九三與乾之上九也乾九三未至于極遂有乾惕之厲乾上九已至于極遂有亢龍之悔在乾且然況恃其无妄不審時之窮而行之其能无𤯝乎象曰窮之災雖君子亦無如時勢何矣不耕穫不菑畬非聖人教人于所當為之事皆置而不為耕穫菑畬之象求利于其事之心也正其誼不謀其利明其道不計其功可矣豈并正誼明道之事而亦委之為无妄之福耶象釋之以未富明其無富之之心以此而往仍一无妄之天而已大畜乾為巽所畜巽隂也以隂畜陽以小畜大之義也乾為艮所畜艮陽也以陽畜陽以大畜大之義也在人莫大於畜徳在國莫大於畜賢在治道莫大于畜止人之强悍故大畜有此三義剛健篤實畜徳之要也前言往行畜徳之助也剛上尚賢不家食吉畜賢之謂也能止健畜止之謂也畜徳以卦徳卦象言畜賢畜止以卦體卦變言彖傳釋之詳矣彖辭兼三者而言爻辭則専主畜止為言艮在上乾在下以上之艮畜下之乾也初以陽在下而為六四所畜止故利于止而不能有所進九二為六五所畜止故輿脱輹而不可有所行惟九三上應上九兩陽不相畜故有良馬遂之象焉此主為人畜者言也六四童牛之牿止于初也止惡于初則勝之為易故元吉也六五以柔得位而畜剛畜之有道者是謂豶豖之牙而吉上九與九三兩剛不相為畜純陽并進故曰何天之衢言通達而無所事畜也此主畜人者言也故上三爻吉亨而下三爻皆利于止而不進各成一義也人思以善止人之不善惟有二道止惡於初者最善也家人之所謂志未變坤之所謂隂始凝大畜之所謂童牛之牿元吉者是也以柔道制人之剛控馭有道者次也蒙之所謂包蒙大畜之所謂豶豖之牙是也失此二者而以剛制剛疎之于濫觴而勝之于末路鮮不决裂而致吝矣頤頤者人頷頤之象故取象于養頤有養人自養養賢三義自養之中又兼養徳養身言之觀頤觀其所以養人者自求口實觀其所以自養者養賢以及萬民養賢之義也慎言語養徳之要也節飲食養身之要也養正則吉者循理則安從欲斯危葢養人與養于人皆以得正則吉也隂不能自養而求養于陽觀其所以養人者指初上二陽而言也觀其所以自養者指中四隂而言也大約養之為義動而従欲則凶靜而守理則吉故下震體則三爻皆凶上艮體則三爻皆吉頤之大義盡于此矣初本陽也而居震體之下動于下者也故有舍靈龜觀朶頤之凶上亦陽也而居艮體之極止于上者也故有由頤之吉二三與震為體故養于初而皆凶初本凶也四五與艮為體故養于上而皆吉上本吉也二三之象曰行失類又曰道大悖非指其求初而言乎四曰上施光五曰順以従上非指其従上而言乎四隂爻以其無陽剛之徳不能自養而待養于人故皆曰顛曰拂又以其所求之正不正而吉凶分焉正彖辭所謂觀頤自求口實也然則求養于人者可不慎所擇哉頤者養也人生嗜慾之聚莫大于有身莫大于自養其身故動而不能忍則嗜慾横流無所不至凶之媒也止而不違其則則天理常勝而有以制人欲之防吉之理也易中未有連三爻并言凶者獨見于頤之内卦何也以其動也亦未有三爻并言吉者獨見于頤之外卦何也以其止也頤雖取象于頷頤然口腹特養身之一耳自此而宫室服御凡耳目所接之物皆所以自養則皆頤之類也人心嗜慾之萌惟剛健可以勝之若柔弱則因循苟且必䧟溺于中而不能自拔初九陽也而居動體自損其剛健而歆羨于紛華故曰舍靈龜觀朶頤陽本足貴而至此亦不足貴矣亦字對下四隂言也顛顛倒也拂違拂也四隂爻之繫詞大略皆同二言顛頤拂經後或言拂頤或専言拂經或専言顛頤互辭也謂以隂柔而當頤之時則必至縦嗜慾而忘天理顛倒拂亂于頤之正矣況乎六二之上三爻皆隂丘者聚也衆隂之所聚嗜慾之藂也由此而往汨没日深有不得凶者乎行失類者謂與羣隂為類所以失也六三隂柔不中不正既拂乎頤之經又處乎動之極凶之至也故繫以十年勿用而象曰道大悖非謂其動而不止而然乎六四以隂居隂雖顛拂乎頤之理幸其為艮體而得正故曰吉猶恐其過柔也必虎視耽耽而剛猛又其所欲者逐逐相繼而有序則可以无咎矣上施光者謂従上九之養而得光大也六五隂柔故亦曰拂經以其艮體故曰吉但以其柔也故曰居貞曰不可涉大川順以従上者皆従上九而得吉也上九以陽剛而靜止深得乎頤之道六四六五之吉皆由之故曰由頤曰大有慶非謂其靜而能止而然乎大過大過者四陽二隂易之分陽為大大者過也故曰大過大抵為事之太過與時之太過三四為棟上應乎三初應乎四初上二隂不能勝重故曰棟橈卦體既大過矣而爻則以不過者為美亦相濟之義也初六巽體也天下萬事不可過惟過于卑巽則可以无咎故曰藉用白茅曰无咎上六則兊體也是謂説之太過天下事恱人之過者鮮不自失其身故曰滅頂曰凶曰无咎自作之孽無所歸咎故曰不可咎也又初六以隂居陽上六以隂居隂亦有過與不過之分焉九二九四以陽居隂剛柔相濟過而不過者也故无不利而吉九三九五以陽居陽有剛无柔過而太過焉者也故凶而多咎此卦爻相為調劑之義然也天下事太過與不及相等易者性命隂陽之書也窮則變過則損進則退故處大過之時遇大過之事者以剛柔相濟為善九二以始過之陽而比初隂陽上隂下陽乗乎隂也故有得女妻之象九五以過極之陽而比過極之隂隂上陽下隂乗乎陽也故有老婦之象卦中惟二隂而各有所比故取象于夫婦其所以吉凶分者則以承乗之位有殊也初六慎而過者也上六柔而過者也慎而過與柔而過相似而不同慎可過而柔不可過也故一則无咎而一則凶九二陽乗乎隂故曰老夫得其女妻正也九五隂乗乎陽故曰老婦得其士夫不正也卦象木為澤所滅故二五皆曰枯楊隂在下故曰生稊隂在上故曰生華坎坎卦陽剛得二五之中故為有孚心亨之象水必行而進有漸故曰行有尚流而不盈行險而不失其信卦之象也剛中卦之體也以卦象卦體而言卦才之善如此設險又别一義也徳行教事又取習坎之義也坎䧟之時惟剛明之才方有出險之功但九二在重隂之下故出之為難僅求小得而已九五則幾出乎險矣故曰祗既平无咎餘四爻皆隂以隂柔之才而當險難之時惟有載胥及溺耳故一則曰凶一則曰勿用入于坎窞寘于叢棘皆終不得出險之象其所以不能出者則以其柔弱故也獨六四柔而得正切近九五五當險難之時而下得柔正以承之故與諸爻之義不同惟其柔而正故有誠心進納之象由是觀之剛明固出險之才柔正亦處險之道非此二者以言出險難矣樽酒簋貳當為一句用缶當為一句言一樽之酒貳簋之食而用誠信以將之亦可以享本義以貳用缶為句于象傳又以貳字為衍文此等處皆似未安當以程傳為定也且損卦明言二簋可以用享簋貳古人所謂至薄之物也朱子乃云既曰樽酒簋貳又曰用缶亦不成文理自今觀之易辭古奥即如此讀亦未見所謂不成文理也況象傳現証于下乎陽剛為隂柔所䧟故曰坎曰險君子固不幸矣于小人獨幸乎故于初于三于六聖人皆繫之以凶皆以其䧟陽而凶也此時九五居坎險之中岌岌乎危矣使前後左右皆小人而孤陽不更殆乎故于六四一爻柔正近君聖人許之為艱難共濟之臣而教之以誠信達權以共圖其君之事樽酒簋貳用缶誠信之謂也納約自牖達權之謂也此即剝之六三六五之義聖人傷微陽之無助苟有利于君者聖人皆樂與之而不深絶之也六三上六之所以尤凶者則以其乗剛而然也義益可見矣初六上六皆曰失道失道有二義焉隂柔不可出險失處險之道也以隂而䧟乎陽失自處之道也離離卦以二隂麗乎四陽之中卦本隂也故隂為體而陽為用觀彖傳曰柔麗乎中正則知二五為一卦之主也審矣以其隂柔而麗于陽也故曰利貞以其柔而中正也故曰畜牝牛吉又離者日象也故曰重明以麗乎正六爻之中六二得中得正故曰元吉六五得中故亦曰吉初九明之始上九明之終故皆曰无咎重明繼照兩日之象也九三為此日之將終故曰日昃之離重剛不中故曰凶九四以剛而迫五之柔五之所以出涕嗟若者正為此也故有焚棄死之象不言凶而凶可知矣此正所謂三多凶四多懼也日昃之離一節足以了生死之理人之生死如隂陽之有晝夜日不能常中而不昃月不能常盈而不虧天地不能有晝而無夜人生天地間不過萬物之一耳而能違隂陽往來之數乎故當為鼓缶之歌以聴其自然不當為大耋之嗟以徼倖其必不然明乎晝夜之故以知死生之説非易其能言之乎凡易中言黄皆在中爻也坤之五曰黄裳離之二曰黄離噬嗑之五曰黄金遯之二曰黄牛鼎之五曰黄耳則黄之取義其為中也明矣又皆以柔以得中故皆繫之于隂爻而得吉也水者外柔而内剛外暗而内明故坎象之火者外剛而内柔外明而内暗故離象之夫下之至險者莫如水故設險之義𤼵于坎空中有火麗木則明天下之相附麗而明者莫如火故附麗之義發于離日月麗天而後明百穀草木麗地而後成人之道獨無所麗乎人道莫大于君臣君之道以明為主臣之道以柔為本明非正則苛察之弊生柔非正則謟䛕之風熾故皆麗于正而後吉然則正乃人道之所麗乎重明以麗乎正指全卦上下二體言之也明莫大乎離而此又重離焉故𤼵重明麗正之義柔麗乎中正當指二五言卦中惟兩隂爻而得中得正故𤼵柔麗中正之義柔本非盡善惟中正故吉故字是以字立言甚有輕重也臣之道取法于坤柔其道也乃順承天无成有終先迷後得黃裳元吉黃離元吉皆柔也特聖人之所謂柔乃無専成之義耳非諛從而無所可否之謂也禹臯稷契共成唐虞之治而不自有其功潛移黙運而不見其迹此柔道也如伊尹霍光終是臣道之不幸而不可謂臣道之常即至批鱗犯顔亦非盛世之事究竟不能无咎此古人所以謂願為良臣不願為忠臣也九四之位前明既去後明方來正繼續之時四處臣位剛而不中不正正與黃離之臣相反故有突如來如之象以此知臣道之貴柔而得中也六五君位而柔逼于上下之二陽故有出涕戚嗟之象而亦言吉者總之離明為君徳所尚故也五不能盡君道而歸之上九以其剛明及逺而又能得中故也大抵陽之性在下則動在上則止初四二爻在二隂之下又離象為火有炎上之性故初則履錯然而四則突如其來如也特初在卦之始意念初萌故敬之則可以无咎四在卦之中又迫近于五位不中不正其凶不可救也天地之大用莫如日月水火故上經始乾坤終坎離坎之象為月為水離之象為日為火皆得乾坤之中爻乃天地之中氣也只天地水火四件已盡震者一陽在二隂之下雷出于地中之象又為離火之象而虚其上也巽者一隂伏于二陽之下風行于天下之象也艮者一陽止于二隂之上山附于地上之象也兊者一隂見于二陽之上坎水之象而塞其下澤之象也風從乎天澤従乎水雷従乎火山従乎地故天地水火四者盡之矣易經衷論卷上
