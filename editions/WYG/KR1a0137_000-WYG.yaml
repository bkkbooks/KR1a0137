body:
  text: 易經衷論易類提要臣等謹案易經衷論二卷國朝張英撰英字敦復桐城人康熙丁未進士官至文華殿大學士兼禮部尚書諡文端是書乃所作易義専釋六十四卦之㫖而不及繫詞以下每卦各為一篇詮解大意而不列經文其立説以朱子本義為宗各為闡發其藴而於坎卦之貳用缶句則又以本義為未安而依程𫝊以樽酒簋貳為句其斟酌盡善不為苟同非世之遷就傅㑹者所可及其解乾彖元亨利貞云文王繫辭本與諸卦一例解乾坤文言云聖人舉乾坤兩卦示人以讀易之法應如此擴充體㑹亦皆見地明逹無紛紜轇轕之病其他本乗承比應之理以直抉夫吉凶悔吝之所以然大都言簡意該不以象數穿鑿自生枝節猶説易家之平正篤實者也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7b831712032bac6332411311f39cd753266005c818174a5196e2311b7aab1dc1
