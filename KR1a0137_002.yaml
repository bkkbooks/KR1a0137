body:
  text: 易經衷論卷下大學士張英撰咸無心而感謂之咸山上有澤感之象也男女皆少感之至也天下萬類之暌合莫大于相感故極之天地感萬物聖人感人心而咸之理始盡矣感應之理莫大于心思心思之感先見于一身而後及于萬物故六爻取象于人身也九四象心思為感之主其五爻大約皆不能自動而隨物以動者不曰足而曰拇曰腓不曰身而曰股曰脢不曰首而曰輔頰舌足能動之物也拇與腓不能動而隨足以動身能動之物也股與脢不能動而隨身以動皆易于感者也輔頰舌則動而感人之物也九四無所取象而本義釋之以心之象則以其言思也六爻之義大約言物感之來易于紛擾故皆以鎮靜貞固為得往來憧憧為戒二之凶三之吝四之憧憧往來上之滕口説皆此義惟初之咸拇五之咸脢不為所感故初則不言吉凶五則曰無悔而舍是鮮有不得失半者吉凶悔吝生乎動動生乎感一有所感而本然淡定之性真汨矣能保其無失者幾人哉爻之所象可謂奇而命意可謂曲矣天下事物之來惟順以應之虛以受之無將迎于前無繫纍于後所謂聖人何思何慮也咸拇感于最初是事未至而預逆之也咸腓是事將至而躁以乘之也咸股是事已至而中無所主隨人轉移也咸脢是事已至而却物以為高也咸輔頰舌是虛意以感人而人不應也兼此五端而感之弊盡矣惟九四以心為官以思為職不役于一體故勉以貞吉戒以憧憧抑思者感之本也彖言感而爻言思亦互相發明耳咸本乾坤二卦特三上二爻互易而成咸耳故取夫婦之義咸者二少也初婚之禮男下女一時相咸之道也恆者二長也居室之常女下男萬世家人之恆也故與損益二卦各有取義恆恆之義有二不易之謂恆不已之謂恆恆之卦義有四剛上柔下上下之恆也雷風相與物性之恆也巽順而動制行之恆也剛柔皆應咸孚之恆也恆之大者莫如天地日月四時聖人故彖辭推而極言之恆之彖辭盡善而爻辭皆不盡善者何哉則以下卦之體為巽巽務巽入初為巽之主故有浚恆之凶謂過以恆理求之而不知變也上卦之體為震震為震動上為震之極故有震恆之凶謂以震動為常而不知節也巽震皆不可為恆況巽之初震之終乎以中四爻言之九三過剛不中過剛非可恆之德故有羞吝之傷六五柔中柔中亦非可恆之德故僅為婦人之吉九二九四皆以剛居柔均不得位皆宜有悔但二以得中而悔亡四以不中而無所得甚矣恆之難也恆卦六爻大約以學術德行為言初之浚恆者不能安于日用飲食之常而求之過深不能循乎下學上達之理而深求于始是索隱行怪之流故雖貞亦凶而無所利也終之振恆者處恆之極而震動以居之功敗于垂成志滿于居上故曰大無功也初之所以浚恆者以其為巽之體巽務深入故也終之所以振恆者以其為震之極動而失常故也二爻又皆隂柔豈成始成終之道乎九三重剛不中剛過則躁動是當恆而不能恆者故曰不恆其德九四居位不正是不當恆而恆者故曰久非其位惟九二六五居中似可以得恆之理但二恆于剛又居臣位僅可無悔五恆于柔又居君位大非所宜是六爻皆不能盡恆之理所謂中庸不可能也惟天地恆久不已聖人久于其道始終盡恆之理故觀恆卦者當合彖爻而并觀之遁卦自一隂生為姤是小人用事之始也至遁而二隂盛長君子當退避小人之時也故姤卦之時君子猶或可勝小人故有包魚包瓜之象至遁則其勢愈盛君子惟有引退而去耳過此則為否乃君子儉德避難之時雖欲去而懼其不能矣卦以二隂起義爻則全以遁取義遁貴在前若在後則不能遁遁貴無所係應若有所係應則不能遁遁貴剛健若柔弱之人則不能遁初以柔居後故有遁尾之厲六二爻位皆柔雖中順自守恐其遁之志不固故曰執用黃牛之革九三艮之主也艮止非能遁者又下比二隂故有係遁之厲上三爻皆乾體乾剛則能斷而無所係戀雖有所應無傷也故曰好遁曰嘉遁曰肥遁曰嘉曰肥則遁之嘉美而寬裕者也鴻飛冥冥弋人何慕雖有二隂之長亦復何所懼乎下卦三爻周公皆不以遁許之惟剛明之君子見幾審決而有得乎遁之宜故三爻皆吉而上獨曰無不利也逺小人不惡而嚴尤善于釋遁之理矣天下有山山有侵逼乎天之勢而天體無窮究不可及易以山比小人以天況君子有去而逺之之義故取象于遁也不惡而嚴者惡則有攻小人之力嚴則止于籓籬自固不為小人所窺伺中傷蓋時當二隂盛長小人方盛之時故不利于攻而止利于自守耳大壯卦中四陽盛長將決二隂而去之故為大壯卦德內剛健而外震動又雷震于天之上皆壯之義也壯往者慮其不正故彖言利貞易之理以陽為大以隂為小故大彖彖傳之詞皆幸其盛也又以謙為善以壯為戒故六爻之辭皆戒其壯也陽剛居壯之初在爻之下動則有凶故曰征凶上六居壯之終動之極雖隂柔而不能無咎故曰無攸利羊者外柔內剛卦體亦外柔內剛故四爻取象于羊三居剛之極上居動之極故兩爻皆曰羝羊觸藩三則以剛居剛重剛不中上則以其柔而居壯極也惟九二九四以剛居柔雖能不極其剛然當大壯之時故均有戒辭焉二曰貞吉四曰貞吉悔亡則聖人之意可見矣下四爻純剛壯極六五忽濟之以柔故有喪羊于易之象易雖當壯往之時慮其過剛難制動而招尤故六爻之辭曰凶曰厲獨于三隂爻係之以貞吉艱則吉則聖人之所以用壯者亦于斯可見矣壯之初也止于不能進壯之終也至于不能退夫不能進尚可言也不能退其可言乎陽剛天之德也一動則其勢不可禦故復一陽而曰亨臨二陽而曰元亨利貞泰三陽而大小各半矣故曰吉亨至遁則四陽盛長于下懼其勢方盛而驕故不曰吉亨而但曰利貞至夬以五陽剝一隂于上懼其當極盛而疏故揚于王庭屢詞以戒之于此可以見持盈保泰之難矣非禮弗履之義有二氣矜之勇有時而怯君子以禮義自持不愧不怍卓然自立萬夫莫禦此非禮弗履之所以為大壯也天下最難克者有己之私非強毅果決之力必不能勝人欲之橫流却物纍之紛擾必大壯而後能非禮弗履也程子引強哉矯以釋斯義孟子謂浩然之氣集義而生其深明大壯之旨者歟晉晉下順上明是以柔順之臣而麗乎大明之君又明出地上其道光顯故係之曰康侯用錫馬蕃庶晝日三接也晉者人臣之道以柔正為順而戒乎剛況剛而不中不正乎卦六爻四柔二剛初以柔居下故有晉如摧如之象二以柔而無應故有晉如愁如之象然初以其無位也故曰裕無咎二以其得中也故曰受兹介福三本不中正者也以其柔而居下卦之上帥下二隂而并進又坤衆象也故曰衆允五以柔而居中故曰往吉無不利此四柔爻之所以皆善而二五以其得中故獨曰受福曰往吉豈非人臣自靖之道以柔中得正為吉乎九四剛而不中正上九剛居晉極一則居近君之地一則居卦位之上皆以跋扈強梁逼上竊位其與人臣靖獻之義大相悖謬矣故雖貞亦厲雖貞亦吝況不貞乎此兩剛爻之所以皆不善也又以六爻而言之初與四應者也四以剛而居高位不中不正為妨賢病國之人初適遇之能不遭其阻抑乎故有摧如之象也二與五應者也雖君臣同德而大明在上二順承之內度其身外度其君遺大投難能無愁如之象乎然以貞吉而受福又可信也六三以柔而居下卦之上帥羣隂以聽命于大明之君故上見信于君而下見信于友有衆允之象也九四居高位而以剛逼柔然五本明體也四貪而且畏故象鼫鼠五以柔中為一卦之主貴乎虛己以聽之故曰失得勿恤上九明之過進之極剛而居上過剛過明惟可自治而不可以治人故係之以厲吉而又終之以貞吝則剛非晉之所宜也明矣明夷明夷者傷也其象則為明入地中其處之之道則曰內文明而外柔順凡卦皆以五為君位此獨以上為君位下五爻皆為其所傷觀五上二爻所係之辭可見矣五爻皆言明夷獨上一爻曰不明晦言其以晦而傷人之明亦終于自傷也以六爻言之初九雖陽剛而在下去上最逺當明夷之時可以高飛逺舉而不受其禍六二柔順中正是履虎尾而不傷之象也九三以至剛而應至柔以至暗而尅至明故當南首而除其惡六四柔順得正而去五稍逺又下與初應是雖居尊位而猶可委曲退避以自全者故辭曰入于左腹言處暗則可免也又曰于出門庭言猶可他適也至六五則切近君位所傷獨深故象之于箕子人臣處此惟有守貞不回而已更何所逃于天地之間乎古人以上六象紂之暗以六五象箕子之奴囚以六四象微子之去國以九三象武王之觀兵以六二象文王之服事以初象太公伯夷之高蹈其于明夷之義可謂咸當而無餘矣九三離上明之極也上六坤終暗之至也惟以至明遇至暗而後可以行放伐之事或明不至或暗不極則君臣大分不可一日忘于天壤而夫子尤伸千古之大防曰南狩之志乃大得也有伊尹之志則可無伊尹之志則篡鳴條朝歌之役豈後世姦雄所得藉口者哉初九有于飛于行之象六二有拯馬壯之象九三有南狩之象六四有出門庭之象皆主于去者也君子當暗汶之時苟可以潔身逺禍正當隨其勢之淺深而行之惟六五貴戚近君義無可去故取象于箕子之貞蓋五爻中惟此爻之自處最難故以全卦之義歸之家人卦有以二五二爻取義者家人是也五以剛正位乎外男之象也二以柔正位乎內女之象也正而且中家道成矣初以陽剛為正家之始上以陽剛為正家之終始之不正後雖竭蹶救之操之則傷恩縱之則傷義何則志已變也故聖人于家人之初曰間有家此非柔者能勝惟剛者能勝也于正家之終而歸之于反身未有反身不誠而能正其家者不能反身而徒言威如之吉則嚴厲亦足傷恩此亦非柔者能勝惟剛者能勝也觀于初上二爻而治家之道思過半矣六二正女正位乎內者柔而得正上應九五故曰無攸遂在中饋正所謂無非無儀惟酒食是議而得婦道之正矣九五正男正乎外者剛中而得正下應六二故曰王假有家勿恤吉正所謂刑于寡妻至于兄弟以御于家邦而得夫道之正矣故皆曰吉也九三居下之上是家人之長者也長者以剛居剛而不憂其過故曰家人嗃嗃雖厲而亦吉九四居下之上是家人之幼者也幼者以柔居柔柔得其正方稱子弟之職故曰富家大吉六爻之盡善者謙大有而外無如家人謙者一身之善也家人者一家之善也大有者天下國家之善也六爻中剛四柔二初則以剛間于始上則以剛成于終九三剛而得正九五剛而中正此所謂父道也兄道也夫道也六二柔而中正六四柔而得正此所謂子道也弟道也妻道也剛柔咸得其宜所以咸吉也身者家之表而家者又天下國家之鵠也故家人一卦曰言物行恆曰反身言家者必本于身又曰正家而天下定言家者必及于天下家人之時義大矣哉程子釋家人卦曰正倫理篤恩義善哉其言之也蓋倫理不正而惟恩愛之是篤則懼其流于姑息而足以傷義恩義不篤而一于正倫理則人心離悖無以相聨屬而足以傷恩二者缺一不可能全此二者而善用之刑家之道其庶幾乎夫子于初爻係之曰志未變上爻係之曰反身言近指逺義理完備可以尋繹不窮有家者念之哉婦無公事休其蠶織詩之所以刺也外言不入于梱內言不出于梱禮之所以訓也故曰無攸遂在中饋于六二一爻係之必如是而後謂之女貞彖傳則男女並稱大彖則専言女貞蓋家以女為主女能克守婦職不與外事則王者勿用憂恤而吉矣卦之所以善由于女之貞女之所以貞由五以剛健中正為之表而間之于初孚之于終也此六爻相為貫通之義也嗃嗃而家恆昌嘻嘻而家必敗為家督者安可不三復斯言家人之六四即蒙之六二也蒙曰克家家人曰富家皆以柔而得正為美為子弟者烏可不深明斯義哉睽火之性上炎澤之性下流其性睽也二女同居而所歸不同其情睽也天下事無終睽之理其始睽者終必合故又以天地男女萬物極言之六爻皆言始暌終合之義二五隂陽正應雖當睽時必委曲相合故二曰遇主于巷五曰厥宗噬膚也于巷言其從之密噬膚言其入之深當睽之時不容不如是耳初之喪馬勿逐自復三之無初有終四之睽孤遇元夫上之睽孤匪寇婚媾皆始睽終合之義初當睽時而上比九二故雖剛而無應皆不得謂之孤六三以柔居二剛之中當睽之時故前見輿曵後見牛掣惟九四居二隂之中上九乘一隂之上剛而無耦皆曰睽孤大約天下事以至誠忠信感之則何所不合睽離之患皆始於猜疑瞻顧見輿曵其牛掣其人天且劓則其猜也深矣見豕負塗載鬼一車先張之弧後説之弧則其疑也至矣三居下而猜之至九居上而疑之深猜疑既動觸處皆然兩見字極有義藴天下本無是事此人本無是情而疑者見之恆如此此睽孤之皆其自取也二爻形容善疑之人可謂傋見其情狀者矣睽則無與故四上二爻曰睽孤睽則多悔故初五二爻曰悔亡繫辭之險未有如三上二爻者蓋各居一卦之上暌之極也故其辭如此乖則睽和則合遇雨之吉隂陽和也故于睽終言之蹇蹇上坎下艮險在前止而不能進蹇之義也山下有水謂之蒙蒙者昧也山上有水謂之蹇蹇者阻也彖辭四句則皆處蹇之道當蹇之時利于平易不利于險阻大人足以濟蹇貞固足以處蹇得其道則雖蹇而吉矣以六爻言之止在下險在上故來則反乎止而安往則入于坎而益蹇故初三四上以來往言之皆喜其來而惡其往也九五與初二不言來往者五為人君當大蹇之時二為人臣有濟蹇之責君當蹇則以求賢為急故曰朋來臣當蹇則以致君為念故曰匪躬之故若其他則不與五應或隱居高蹈或遺榮避世何來之不善乎惟上六以往則窮以來則下就于五九五正所謂大人也以卦體言之上為蹇之終又為坎之終是蹇極而將解之時上六下佐大君以濟時之蹇豈不碩大而吉乎與諸爻之獨善其身者異矣故來譽來反來連皆不言吉而獨于上六言來碩吉者聖人謂獨善之士僅能無咎無譽不如濟時之士之有功也故以見大人從貴係之明乎濟蹇之道惟在于君臣志合天下無常否而不泰之時亦在乎君與臣維持之而已矣蹇解二卦皆以坎起義止于坎下則為蹇動于坎上則為解人處險難之時惟視己之精神震動發皇始有出險之功故宜動而不宜靜也利西南者指五從四而入于坤體之內往而得中故曰利不利東北者指三止于艮體之上而近逼于險故曰不利聖人作易于泰于豐于豫多致其警誡之詞于否于困于蹇多致其勉勵之意蓋困厄者天時而補救者人事人之不能違者時也而其不可諉者亦時也觀蹇之六爻易之所以贊化育者可見矣濟蹇者在于衆力維持故五曰朋來二曰匪躬固然矣即三之來反四之來連上之從貴一則欲其下就二隂一則欲其下就一陽一則欲其下助九五惟初六無所就而傳又釋之以宜待非欲其終退也可見蹇難之時無論有位無位當同心合力以濟之而不可有猜疑畛域之嫌獨行取咎之失也解止于險內謂之蹇動乎險外謂之解在險之中非震動之才不能出故震上坎下為解也以蹇配天地之閉塞以解配天地之發生則人事類是矣以六爻言之下卦坎體上卦震體震動所以出險而成卦之解故震卦三爻皆解去小人之象初處九二之下又當解之時能與九四為正應是非有心于為險者故無咎九二雖以一陽處二隂之中當解之時是出乎險矣又與六五為正應故有獲三狐得黃矢之象六三以隂乘陽以柔乘剛九二之所由陷故為負勢凌賢之小人九四以震體陽剛應下初隂故必欲其解之也六五下應九二為卦之主故解之而後吉也上六自處高位又當震極而應下六三六三隂柔之小人也上六解之故如自立于高墉之上而射隼小人情形無不立見有不獲之而利者乎故去小人為解散患難之大而震動發皇則又為去小人之本也本義解來復謂復其所而安靜程傳謂大難平定之後當正綱紀明法度復先王之舊漢唐以來惟苟安無事皆不知來復之義立説更為完密耳夙吉者救民水火則宜速遏際亂略無使滋蔓則宜早彖傳廣之于天地象傳推之于刑罰爻辭又歸之于解去小人説解可謂備矣君子小人不同立必獲狐而後得金矢之直必解拇而後有朋至之孚乃消長必然之理但不能不待陽剛之人故于兩陽爻發之也按六爻之中有主解散之義者初爻之剛柔相際是也自二至上皆主解去小人之義二四陽爻五上尊位皆有解小人之權惟六三為其所解狐者蠱惑之小人也拇者依附聨屬之小人也隼者悍鷙高位之小人也小人中惟此三等去之最難故解除患難必去此三者禍亂既定之後以去小人為急自古未有無小人而足以召亂者此解卦六爻又所以廣彖辭之義也損損本卦泰也自損下卦之一陽而益乎上卦之一隂遂為損當泰之時惟知損下以益上則其為損也多矣然亦有時之不得不損者其惟二簋用享之時乎揆時之不得不損而後損之斯人心信服而有孚元吉矣何輕言損乎彖辭曰損剛益柔有時六爻之義皆損剛益柔者也初以剛居剛而過乎剛故曰酌損之九二上九以剛居柔不過乎剛故皆曰弗損益之六三正當損之時故曰損一人上三爻皆受下三爻之益故本義于四曰初九之陽益己于五曰受天下之益于六曰居卦之上受益之極此言上三爻皆受下三爻之益也損乎下則益乎上此必然之勢既言益上矣復名損者何哉蓋上雖益而下實損披根以榮枝根盡則枝稿剝民以奉君民貧則君病雖益之實所以損之也故于損則兼言益相往來者也若益則不言損者何哉誠益于國何損于君誠益于民何損于上上雖益也而下必損故兼言損益下既益矣而上必不損故不兼言損益此作易之大旨也天地隂陽君臣上下男女夫婦之理皆兩相與者也雖兩相與而其實則一也參之以三則雜矣故易曰三人行則損一人一人行則得其友周公特發此精義于損卦之三爻孔子又于繫易而舉天地隂陽以盡其致一之理于此見聖人讀易之精也益益本卦否也當否之時必有所以益之而後可以傾否故損上卦初畫之陽以益下卦初畫之隂而謂之益彖所謂自上下下其道大光也損卦則二五皆不得正益則中正有慶矣此損益之分也下卦三爻皆受上三爻之益初九益卦之主正受上之益者故曰利用為大作六二以柔居中而受九五陽剛之益故繫辭與損之六五同益之十朋之龜弗克違則其益也宏矣六三不中不正居下之上危地也故曰益之用凶事上三爻皆益下者遷國尤益下之大事三四皆不中正故受益者與益人者皆當勉之以中行也九五正益下之主以剛中正在上而下以柔中正應之故曰有孚惠心則其為元吉可知矣上九則益之極而反損猶泰之極而反否也天下安有常益之理哉四爻互體坤坤土也故利用為依遷國益卦稱元吉者二稱吉者一稱無咎稱利者二且不兼言損明益下之為利溥也上九獨言凶六三亦言凶事者皆以其處益之極也六三柔而居下猶可言也上九剛而居上不可言也以求益之極而又以剛行之其能免乎與易謙受之理悖矣故獨曰凶初受上之益是小臣而蒙上之福必思有以報之故利用為大作二以中順之德正應九五大被恩寵故曰益之十朋之龜三處下之上不中不正而隂柔過甚故益之以凶事凶事云者威罰以懲創之警誡以震動之或處之于險阻或任之以艱難皆所以益之也六四以大臣而行益民之事故曰告公從九五以大君而𢎞益下之仁故曰有孚惠心至上九則益之極而反損循環之理也損益彖辭主民言故曰民悅無疆六爻主君臣相益言亦所以補大彖之不逮也損吾身者莫大于忿欲益吾身者莫大于遷善改過損其所當損益其所當益此大象又别發一義以補彖爻之不逮也夬夬者以衆陽決去一隂之象也以一隂處將退之勢決之似易以一隂處上位之極決之實難以君子而有去小人之心其勢不勝反為其所乘者古今何可勝嘆哉故彖辭深致其危厲之意以今觀之亦可謂費辭者矣揚于王庭正其罪也孚號求君子之助也有厲戒備之也告自邑自處于無過之地也不利即戎不可徒恃剛壯也利有攸往攸往之勢也聖人之情見乎辭矣以六爻言之五陽皆欲決陰者也而所處之地不同五以陽剛居尊位可以決之矣以其近于上故有莧陸之象恐其感之者深三以剛居剛正與上應意欲決之矣然過剛不中故有壯于頄之象恐其行之者暴也然決去隂柔惟此二爻能之故二爻専言夬夬欲其決而又決也遇雨若濡有愠無咎與中行無咎又望其行權守中善處小人而不為小人所乘也若二與四則以剛居柔皆無位者故但為惕號以防莫夜之戎牽羊以從諸陽之後而不以夬決之事望之也若初則居下而去之者益逺故往則有不勝之咎觀夬之六爻則知決去小人在乎純剛又不可不委曲權變且不可概責之不當位之人也大約五者決去小人之明君也三者權位相敵決去小人之大臣也四者憂危慮患之人宜居後而不宜居先者也初與二則謹于防己之君子也一隂處將窮之勢見絶于君子則亦無號終有凶而已其能久乎五陽當進長之時可謂壯矣故曰壯于前趾謂其不宜行而行也故有不勝之咎曰壯于頄謂其不宜露而露也故亦有咎聖人于將退之一隂而猶難其辭如此牽羊之説本義主退居于後程傳謂羊者羣居之物牽者挽而同進之象三陽在下四與之牽挽並進以上助于五是合衆君子之力以佐一君而決去小人大臣之事也似較本義為優剝者以五隂而剝一陽何其易也夬者以五陽而決一隂何其難也剝夬皆多危厲之辭皆所以為君子危也剝之上九曰小人剝廬終不可用惜之也夬之上六曰無號之凶終不可長幸之也故曰易為君子謀不為小人謀決而和者非和于小人謂決去小人而無傷恩害義啓釁貽憂之事世路仍安于太平國體不傷于刻急是之謂決而和九五之所謂中行無咎者正以此也姤姤者遇也以衆君子而遇一小人也夬者隂柔將退之時也姤者隂柔方長之機也故彖曰女壯慮其始也聖人之意于初六一爻見之矣繫于金柅欲其止也有攸往見凶戒其進也此非為小人謀仍為君子謀也羸豖孚蹢躅恐君子忽其在下之隂而欲其備之深也爻辭既諄復言之矣象復益之以柔道牽也言隂柔之牽引最易而制防甚難非金柅之固其能止其壯哉金柅即指二也小人方來惟恃陽剛之君子足以制之賴九二與之迫近足以相制故曰包有魚包者轄而統之不使猖獗之意不利賓者恐其遇于衆也九四居位不中不正獨與初應是専與小人為緣而全無制防之具是為包無魚之象起凶者小人漸長之禍皆從此起也九五乃一卦之主以陽剛中正而居尊位故能轄制小人而有以杞包瓜之象杞配陽剛之德魚與瓜皆象初隂也小人將進惟陽剛居中而在尊位乃為臨于小人者足以防之故包瓜包魚之權必歸于九五九二之君子以其皆剛而得中故也小人在下必有一居上不正之人應之此九四之所以凶也九三以過剛不中而有臀無膚之象上九以剛居卦之極故有姤其角之象以其皆與初隂無涉故雖厲雖吝而皆得無咎也剝卦五隂而獨有六三一隂與上相應是當剝之時獨有一人為君子之黨故得無咎姤卦五陽而獨有九四一陽與初相應是當姤之時獨有一人為小人之援故得凶也夬卦是言決去小人之道姤卦是言制防小人之道小人之勢雖衰而決去之不易小人之勢雖微而防制之甚難故曰讀易者使知懼姤者遇也凡不期見而見謂之遇當乾之時衆正滿朝而一隂初生出其意外故曰遇彖辭六爻皆以隂陽之消長言彖傳復推之于天地君德大象又推之于施命四方以明相遇之義至大夫子之推廣易義者如此萃萃聚也卦似比而唯多九四之一陽天下有所萃聚之象也幽以萃鬼神則莫大于假廟明以萃天下之人民則莫大于見大人故彖辭特舉二者言之卦體九五以陽剛中正而居尊位是天下之所萃也猶比之九五為上下之所比也萃天下者在乎位故九五曰萃有位無咎萃天下者在乎德故又曰匪孚元永貞悔亡德位兼隆斯足以當天下臣民之萃而無咎無悔矣彖傳所謂剛中而應故聚者正以此也下坤三隂宜萃于此者乃初六以隂柔而與四應六三以隂柔而與上應故初曰乃亂乃萃三曰萃如嗟如是昧其所當萃者也惟六二居二隂之中獨與五應故曰引吉無咎謂牽引二隂以萃于九五則無咎也初三皆曰往無咎者往從于九五則無咎也九四陽剛而近于五近則懼其逼故戒之以大吉無咎而釋之曰位不當也上六當羣萃于五之時而已獨亢而居上能無齎咨涕洟之傷乎萃卦六爻以五為主合觀彖傳及九五之爻辭而知之矣六爻皆言無咎者何蓋九五陽剛中正以德而居尊位天下有所歸往趨向而不至于無所統故皆可以無咎初之勿恤往二之引吉三之往無咎皆欲其審所萃也四以剛德而上輔明君六以失位而齎咨涕洟避退如此而後可無咎一則曰位不當一則曰未安上義尤著矣六爻皆戒辭升升者進而上也彖辭曰見大人曰南征是皆進而有為之象卦德巽順此升之所以亨也大抵進而有為莫大于誠信初六隂爻居陽位柔而不過故曰允升允非信乎九二陽爻處隂位剛而不過故曰孚乃利用禴孚非信乎九三陽剛而得正居下之上決于進取故有升虛邑之象象曰無所疑無疑非信乎六四近五而過于柔故勉之以誠敬順事曰王用亨于岐山始吉而無咎五居尊位當升之時故曰貞吉至上六則升而不已故有冥升之戒若能終守不息之貞而亦利夫曰用亨曰順事曰貞吉曰不息之貞何一不以信為本乎君子當進而有為之時允信篤誠則剛柔皆可濟也矣大人兼德與位而言欲進于位者用見有位之大人則不憂其位之不進欲進于德者用見有德之大人則不憂其德之不進易以陽為大凡言大人皆陽爻也萃見大人六二見九五之大人也升見大人六五見九二之大人也人欲進而有為非終巽不足以濟事故曰柔以時升初五升階之易由已柔順而有九二剛中之應不至于過柔故可以時升而大得志也困困者下卦一陽陷于二隂之中上卦二陽掩于一隂之下此陽之所以困也六爻則言處困之道惟陽剛中正之人則處困而猶亨所謂亨貞大人吉是也若隂柔之人則當困而益困不得所謂亨貞之義矣九二剛中故曰困于酒食酒食人之所樂也今困于此非困而亨之象乎九四剛而居柔故曰困于金車金車人之所恃以為安者也今困于此非困而亨之象乎九五剛中而正曰困于赤紱赤紱人之所慕以為榮者也今困于此非困而亨之象乎古君子當處困之時葵藿飽于膏梁徒步榮于軒車韋布華于黼黻非所謂困于酒食困于金車困于赤紱者乎九二九五二爻一則曰利用亨祀一則曰利用祭祀又言君子之處窮困皆利于誠信而不宜於虛誕也凡此皆大人之所以亨而小人不能也初六六三上六皆隂柔之人處困而益困既曰困于株木矣又曰入于幽谷既曰困于石矣又曰據于蒺藜既曰困于葛藟矣又曰于臲卼皆困之已深之象如衣敗絮行荆棘中動則有悔其視朱紱方來來徐徐有終及徐有説之辭不且徑庭乎惟上居困之極而將亨故又啓之以有悔而征吉也有言不信者言于昌明之時則人將信之若既處困則當緘默以逺害喋喋不已終致益困所謂尚口乃窮也井井者均澤于衆王者立法以養人之義改邑不改井者時有因革而良法美意不可得而變也無喪無得往來井井者利而不庸惠而不費浥彼注兹而不窮也汔至亦未繘井羸其瓶凶此皆仁心仁聞而施澤不加于百姓事敗于中衰德壅于下流是以凶也君之德及于人以下逮為功猶井之澤遍于物以上出為美故初居最下有井泥不食之象二僅出射鮒而已三居下之上可用汲矣然以其居下體故有井泄不食之象四居上之下曰無咎九五則漸上而功及于物故下皆言不食而至此始言食也至上六則澤被無疆往者來者皆得而取之故有井收勿幕之吉而象曰大成王道至此而盛矣二五皆以剛中五吉而二不吉者上下之勢異也豈非繘井之功宜上而不宜下者乎無喪無得乃因民之利王道之所以大也若私恩小惠便有得而有喪矣國家之患最莫于上有恩而下不被謂之屯膏此正汔至羸其瓶之義舊井無禽者井枯而禽鳥不顧澤竭而人民散亡射鮒之小井泄之棄均為可惜始曰井泥未有泉也繼曰井谷漸通泉也曰井泄不停汚而井潔矣曰井甃漸可用也曰井冽清湛之至而可取至井收勿幕德施公溥及物者逺而井之功效全矣革革者變易也彼此前後不同揆則必革而易之亦猶水火之相尅二女之志不同也以卦象言之水火相息是為革之象以卦德言之文明以説是為革之所以盡善也文明則察于理者密斯有維新之益而無紛更之擾百姓説而從矣惟明斯當惟當斯孚惟孚斯説惟説斯亨惟元亨斯得悔亡是可輕言革哉天地之革莫大于四時聖人之革莫大于受命故特舉此二者極言之革之初事幾未審人情未孚不可以輕言革故曰鞏用黃牛之革象曰不可以有為蓋其時猶未可革也然非拘執固守不知變通鞏用黃牛持之以中順之道也至六二柔中而有應且為離明之主可以革矣故曰征吉無咎九三則過剛不中未可速革利于詳審故曰革言三就九四居變革之際宜于革矣雖改命之大事而亦無不利他可知矣九五剛中而正大人之象也前此之革者至此炳爍光輝故曰虎變然九三九四九五皆以陽剛居變革之際慮其徑情直行未孚民志故三爻皆係之以有孚至上六則應革者盡去而不留君子有豹變之文即小人亦有革面之化此時而更有所革則恐滋其擾矣故曰征凶居貞吉革之始與革之終皆不可輕也如此中四爻皆時之宜于革者然皆有戒辭惟六二以柔順中正而係之以貞吉無咎而與彖同辭則革之所尚可知也夫觀革卦彖辭及六爻辭曰乃革者二曰有孚者三曰征凶者一曰不可有為者一皆所以致其叮嚀告誡之意聖人之不輕言革也如此夫鼎卦之有象于身者曰頤曰噬嗑有取象于物者曰鼎曰井鼎重器也內巽順而外文明始克荷厥任而得大亨又烹飪之器也烹飪之所用莫大于亨帝與養賢而皆有藉于鼎則鼎之為器豈不重哉夫器重則非剛健之德不足以承之初六柔而居下故有顛趾之象猶幸其居初未受重寄故亦有出否之利至九二九三九四則皆鼎之腹也大臣任天下國家之責如鼎受物之重故二曰鼎實三曰雉膏四曰公餗皆兢兢然戒之二曰有疾三曰行塞四曰形渥豈不可懼之甚乎九二以剛而得中上應六五柔中之君故得吉九三雖不中幸其剛而得正上應上九故始雖行塞終以虧悔而得吉也至九四則居下卦之上上卦之下近君之位視九二九三之責更重矣乃已則剛而不中不正又下應于初六隂柔之小人比昵佞諛援引匪類寧不貽覆餗之凶乎六五柔中虛己下賢以其柔中虛己也故有黃耳之象耳不受物而所以舉鼎相君不任事而統御羣下也以其應九二之剛中故有金鉉之象是得陽剛之賢以自輔也有不利貞者乎上九鉉之象也以陽居隂剛而能溫故曰玉鉉下應九三同德相濟是國之老成而有剛柔競絿之德者寧不元吉乎夫鼎配之天下之重天子居尊御下總其大剛而不任繁劇黃耳之象也故以虛己下賢為美國之勳舊老臣身居事外以儀表天下為職而亦不任事玉鉉之象也故以剛柔相濟為美初居下始仕而未受事之臣也故柔則顛趾而尚未有所損惟九二九三九四則居中任重各有所受鼎之重器實式憑之必剛中剛正之賢其庶幾乎九四獨與在下之小人為應形渥之凶亦誰咎矣古稱公輔為鼎臣有以哉震震以一陽生于二隂之下又其象為雷皆震動之象也凡臨大事當大難震動不寧者皆是也處震之道惟心存警懼思患預防則可以出乎震故虩虩者處震之則也如此則笑言啞啞不喪匕鬯皆可決然也震有亨道何也天下事委靡壅塞則必敝壞叢脞震于天時為春于天象為雷于人之德為勇一念振興百廢俱舉故不言而有亨道也以六爻言之初九以陽居初震卦之主是當震來之始即有警愓發皇之意故爻與彖同辭而係之曰吉九四與初同德而處事之中為衆隂所係不中不正又互卦坎體勢必陷于震中而不能出故有遂泥之象處震之道剛則有為柔亦不失故九二雖有來厲之象而終之以勿逐六三雖有蘇蘇之象而終之以無眚六五雖有往來厲之象而終之以億無喪上六雖有征凶之象而終之以無咎蓋震動恪恭恐懼修省則始雖警戒而後能安靜人定而勝天也惟初九以陽剛之德而居震初故可以得吉九四以剛而溺于隂柔故至于遂泥則處震之道亦從可識矣震初爻為成卦之主故與彖同辭四亦陽爻陷于重隂之中而失其所以為震故辭獨凶艮艮者靜止之象也人之一身四體百骸皆主于動而惟背為靜故曰艮其背不獲其身行其庭不見其人皆靜止之象艮卦主于靜而彖傳兼言動靜蓋學問之所貴主于靜者非枯稿寂守絶物孤居之謂也歷乎紛賾之途閲乎蕃變之交而靜正者不失是之謂主靜故彖辭恐人之誤以止為止而曰時止則止時行則行動靜不失其時則釋止之義始全古人止字始見于尚書曰安汝止欽汝止大學發揮之曰知止彖辭釋之曰止其所源流亦大可覩矣以六爻言之震以初為善取其能警備于事端也止以終為善取其能鎮定于事終也震之九四剛而不中正故有遂泥之失艮之九三重剛而不中故有薰心之厲蓋靜止固美德而以重剛居之又處上下四隂之中而互卦成坎如人之腰臀之間不能屈伸則結滯生疾其為危也甚矣艮其趾不行也艮其身無動也艮其輔言有節也三者皆宜止而止雖未必盡協乎時中而主靜之學可以寡過故曰無咎曰悔亡限與夤非可止者而亦止之腓近于限而不能挽其失故曰不拯其隨二者皆宜動而不宜止者也至上九則以剛居上為止之極故獨曰吉與震初爻之辭同焉豈非震之道宜於有初而艮之道宜于有終也哉艮曰敦艮復曰敦復又曰安土敦乎仁故能愛敦之義大矣哉漸止于內而巽于外謂之漸恱于內而動于外謂之歸妹漸自二至五皆得其正歸妹自二至五皆不得其正凡士之登朝女之從人皆宜于漸而得正不宜于歸妹而不得其正故漸曰女歸吉歸妹曰征凶二卦正相對也漸之上下二卦皆以剛乘柔歸妹之上下二卦皆以柔乘剛此又二卦之相反也鴻之行有序故漸卦六爻皆用以為象鴻水鳥也漸干漸磐漸陵皆得其宜而不宜于漸陸與木六二與九五中正而應是君臣之正合夫婦之良配也故六二則飲食衎衎而吉九五雖過剛有三嵗不孕之象而終以正而得吉三則重剛不中不正故有夫征不復婦孕不育之象但以其剛也故又利禦寇六四柔而得正故尚可以無咎初六柔而在下是未仕之臣未嫁之女也故有小子之象上無所應故厲而有言上九無位無應而又居漸之極是高蹈逺引之士也雖無濟世之功而有風世之德故有漸逵之象羽可為儀亦未嘗無益于世也量而後入待六禮而後行出處之正人倫之大也寧有君子處世曽鴻漸之不若哉上二兩爻柔位也有人臣之象故二言不素飽上言羽可為儀三五兩爻剛位也有人夫之象故二爻皆言夫婦初四兩爻居漸之始而各無所應皆得無咎此漸卦六爻之大義也歸妹兊少女也震長男也以少女從長男故曰歸妹歸妹之所以征凶者其義有四説而動一也以少女從長男二也自二至五皆不得其正三也二體皆以柔乘剛四也彖辭但就歸妹二字釋其義之大説而動以下方釋大彖也以六爻言之二五正應夫婦之位也家人六二女正位乎內九五男正位乎外蓋五為夫位二為婦位也今九二則夫居婦位而反應乎隂柔之五故有眇能視利幽人之貞之象六五以柔中而下應九二之剛中是女之賢且貴者而下從乎夫爻之最吉者也故有帝乙歸妹之象此外四爻皆不得其正者故初四以娣三曰反歸四曰愆期六曰承筐無實刲羊無血皆婚姻之不得其正者蓋婚姻以相應為正初與三四六皆無應故皆非吉即二五相應矣所居之位又不正故亦不能全美此歸妹之大旨也觀夫婦之合而君臣朋友之相遇亦可以類推矣古者一娶九女必有娣以從之故三爻皆言娣又以少男從長男亦娣之象也上六虛而無實並不得以歸妹稱之矣二五相應可謂得夫婦之正而以其剛柔易位也故二則戒之以幽人之貞五則美之以君之袂不如娣之袂良皆尚素朴幽貞之意則歸妹之所尚可知矣豐雷動于上火明于下雷火相照豐之象也明動相資豐之義也時處豐盛則釁孽潛滋泰極而否天運然也故豐之彖辭與泰三爻同泰曰勿恤豐曰勿憂泰曰艱貞無咎豐曰宜日中泰言消長之由豐言盈虛之理其義一也憂恤所以處豐泰之道而言勿憂勿恤者為徒憂徒恤者戒也漢孝惠之酒色自廢唐文宗之泣下沾襟所謂不知憂恤之道而徒為憂懼無益于敗亡者也天地且不能違時之消息況人與鬼神決言豐之難恃也以六爻言之離明在下而上為震所掩惟初與四相應為同德故初曰配主四曰夷主謂其皆以陽剛而居卦初也二為五所掩三為上所掩四與五上二陰相近上以陰柔居卦上皆有損于離之明故二曰豐其蔀日中見斗三曰豐其沛日中見沫四曰豐其蔀日中見斗上則暗之至矣故曰豐其屋蔀其家日者離明之象也當豐之時壅蔽易生故四爻之象如此惟五與二應二者離卦之主也雖同為隂柔本非正應而尚有來章之慶五爻或言無咎或言吉皆能戒懼于豐亨之時猶可以無咎而得吉也至上而始言凶者以柔居豐極猶上六之居泰極也其能免于凶乎卦辭大約與泰卦相似天地不能常盈而不虛人事不能常盛而不衰故豐卦屢言日中見于彖爻者四彖傳復以日中則昃月盈則食詳釋之聖人致警于豐者至矣旅旅卦所言處羈旅之道也二五皆柔而得中又外文明而內艮止柔皆下乎剛故可以處羈旅而得小亨以六爻言之隂柔在下過于柔者也旅之所最忌者莫如瑣瑣隂柔之極必致其災九三過剛不中故有焚次之憂九四剛而居柔而亦不中故雖有于處之得而亦有不快之失上九剛居旅之極故有焚巢之禍大約旅之所戒在剛而最不宜居人之上故九三上九皆凶以其無下人之心也惟六二六五柔而得中旅以柔為貴柔則無焚次之傷得中則亦無瑣瑣之患故二有即次懷資得僕之安而五亦有譽命之榮易之所貴者剛健惟旅為不宜九四雖以剛居柔故有不快之失然則旅之所重可知矣旅之善者莫如即次得僕故其失也亦莫如焚次喪僕兩象釋之曰其義喪也其義焚也聖人揆之于理而知其有必至之勢其為人謀者至矣又曰旅之時義大矣哉欲人之不可苟于所處也不留獄之義最妙犴狴桎梏淹滯拘留或為無辜之株連或為老弱之纍繫動經嵗時宜仁人君子隱惻于此然非至明至慎亦不敢輕言決獄能明慎而不留獄斯可謂祥刑矣巽巽者順也入也一陽處于二隂之下為入二隂從乎四陽之下為順天之入物者莫如風人君之入人者莫如命令故皆取其象于巽又巽木也木之根巽入于土之中而陽剛在上故巽又為木也巽雖美德然以得中為貴初六以隂居下巽而過者也故為進退遲疑之象九三以剛居剛過剛不中是本不能巽而勉為巽者其能久而不渝乎故為頻巽之象上九處巽之極過于巽而不知節者也故為巽在牀下之象雖正亦凶此三爻或則過于巽或則勉為巽皆非真能巽者故曰凶曰吝初猶可勵之以勇至上則窮矣故初利武人之貞而上直係之曰凶也九二九五剛而得中六四柔而得正故皆曰吉曰無咎曰悔亡巽本有謙讓之德而又得中得正如此亦何往而不吉乎九二曰史巫紛若祭祀之吉占也史巫以言辭感神亦巽入之義也九五先庚三曰後庚三日更定制度之吉占也以心丁寧揆度于事之中而求其盡善亦巽入之義也六四之言田獲三品者互卦成離離罟之象也在互卦為離之主在三畫為巽之主巽又為近利市三倍故獨曰田獲三品又為田獵之吉占古人繫辭雖賾而不厭要非無所取義也兌兌者澤也説萬物者莫説乎澤故以説人為義彖辭以説之道感人故曰順天應人此説而得其正者也兌為澤之義也爻以説之道媚人故曰來兌曰引兌此説而不得其正者也兌為口舌之義也二隂爻為説之主以説之道誘人而四陽爻則為其所説者初九剛而在下此和而説者也九二剛而得中此信而説者也又皆無所係應未感乎小人之説故皆得吉説而利説而信有不忘其勞忘其死者乎六三則兌之主隂柔不中不正故為來兌而凶九四下比于三而上近于五若為三所動則溺于隂柔之小人能上從于五則親於陽剛之君子故曰商兌未寧在四惟斷然去其小人之諂諛從乎君子之嚴正則可以有喜而有慶矣至五居尊位而切比于上上以隂柔居説之極此小人之尤讒諂面諛最能惑人者也而五近之安能不剝且厲乎故于五則兢兢戒之而于上不係以吉凶者小人之佞諛近之者必損況其身之凶乎不待言矣以六爻言之初與二陽剛之君子也居卦之下受其説者淺故皆能得其説之正而吉三上隂柔之小人専以口舌説人者也九四居近君之位九五履天位之重雖皆有陽剛之德前後皆隂柔之人一或入乎諂諛之中則為所誤而不察故曰未寧曰有厲雖欲常保其陽剛之德其將能乎聖人之垂戒者深矣兩澤相麗互相資益又以口舌相説故為朋友講習之義因其説也故利貞斯為君子之和而不流也渙渙者散也風行于水上有披離渙散之象焉當時勢人心渙散之際則必有以萃之天下之最渙者莫如鬼神祖考既沒其精氣神明渙散而不可收拾先王立為祭祀之禮以子孫之誠敬萃祖考之精神故入室而懓乎如有所見愾乎如有所聞則渙者萃矣故渙曰王假有廟萃亦曰王假有廟二卦所係之辭同也以巽木而行于坎水之上有舟楫之象焉故曰利涉大川乘木有功也以六爻言之有濟渙之事焉有渙其所當渙者焉故居渙之始濟之尚易六雖隂柔而能上比九二故有拯馬之壯九二以一陽陷于二隂之中而當渙之時不為所沈溺故有奔其機之象機者身所安也奔其機則得所安矣故曰得願也此二爻濟渙之義也人生之當散者莫如有我之私次莫如朋比之私人君之當渙散者莫如號令之昭布與府庫之蓄積又人身之欲解散者莫如傷害禍患故三曰渙其躬四曰渙其羣渙有丘者丘亦蓄積之多也渙散其蓄積之多則非常之慶有非恆情所能測者矣四有大臣之道故以渙丘勉之五者君位也故訏謨辰告當渙其大號以財發身當渙其主居君道也上九無位故但渙其身之傷害憂患期于無咎而已下卦坎體坎者陷也故以濟渙為義上卦巽體巽風也故以渙散為義此六爻繫辭之别也節水在澤中過滿則溢必有節制故名為節卦中剛柔均而剛得中節而得中節之所以亨也均寒暑之往來天地之節也衡制度之豐儉聖人之節也以時言之有當節而節者焉初之不出戶庭是也則以初剛而得正也有不當節而過于節者有當節而不能節者九二之不正六三之不中是也上卦坎體故専言節然節之中亦有善有不善焉六四之安節柔而得正上比九五安於節者也九五之甘節剛而得正得中彖所謂當位以節中正以通者也此正聖人在上節制謹度不傷財不害民而天下食其福者也故曰往有尚上六隂柔居節之極故曰苦節貞凶下卦三爻言節之時上卦三爻言節之道節美德也處之而安行之而甘何亨且吉如之苦與甘相反既以節為苦矣其能久而不渝乎節之有尚于中正也如此聖人之制財用君子之處困窮皆有取于節之義然節以甘為美以安為福以苦為尤曰往有尚則可以施之于無窮曰其道窮則勢必至於久而生變審乎此則節之義大矣知通塞知時者也失時極不知時者也節又以時為重中孚中孚之義有二以全卦言之二陰居中謂之中虛虛則無所係纍于人欲之私以二卦言之二陽得中謂之中實實則剛健而可以全其天理之正故為中孚信之在中無所緣飾雖至冥頑如豚魚猶可以感格而化之況智于豚魚者乎巽木行于澤上亦為乘舟之象故又利于涉大川也以六爻言之二五剛中相應謂孚信之實故言鳴鶴子和好爵爾靡皆有孚攣如之象也上下彼此皆以實相信不必言吉而吉可知矣初居孚之始可信與否未可定之時也故在于能度量而猶恐其岐念之雜若上九則過于信本非可信而亦信之如翰音非登天之物而謂其登天豈不謬乎如本非賢而信任之德薄才小任大責重以至覆乃公餗如翰音之登天則亦信之過也中二爻本隂柔而應乎陽者也三與上相應上本不足應而應之故上窮而三亦窮四與初為應初本可應而四應之故初吉而四亦得無咎也且三為説之主四為巽之主故得失亦異初應乎四上應乎三故吉凶亦殊此中孚六爻之大旨也法令信則刑罰省審斷刑獄以實心實意求之則可以得情故中孚有議獄緩死之義必至于格及豚魚而後為信之至苟或不然則當反其信也小過小過之義有三一為小者過一為所過者小一為小事過象所謂行過乎恭喪過乎哀用過乎儉皆謂所過者小小過之一義也卦體二陽四隂二隂得中二陽失位所謂小者過也彖云可小事不可大事所謂小事過也初與上不宜過而過者也故皆曰凶皆係之以飛鳥者鳥之飛在翼初與上正鳥之所為翼也二與五柔而得中不宜過而不過者也小畜係之曰密雲不雨自我西郊小過五爻亦係之以密雲不雨自我西郊者小畜陽為隂所畜小過隂過乎陽隂之力薄雖制陽而不能大有所為故皆有密雲不雨之象九三當過而不過者也九四不當過而戒其過者也蓋三以陽居陽重剛不中四以陽居隂剛而濟之以柔也當小過之時惟小過而後可以無咎初以隂柔居卦之下上以隂柔居過之極三以重剛居不中之地皆過者也故皆得凶六二柔而得正九四以剛居柔六五以柔居剛剛柔相濟不至于過故皆得無咎此小過之大旨也言過則言遇者雖過而猶不違乎理也至弗遇過之則非小過矣故凶祖妣君臣只從剛柔字看祖與君謂陽謂剛妣與臣謂隂謂柔大義但謂不過乎剛而適得其柔云爾既濟天下事之未成則竭蹶之功方來事之既成則怠玩之萌必起故未濟之卦多吉而既濟之卦多戒辭也初吉終亂亦猶泰之不能不否也水潤下而火炎上水上火下則其性相濟故謂之既濟思患豫防不在未濟之時而在既濟之時無平不陂無往不復不在泰之時而在否之時聖人之意深矣哉以六爻言之初二三之義皆主于戒勵曵輪濡尾婦喪茀皆不能行之義伐鬼方而三年始克亦不容遽克之義戒懼如此庶幾處既濟而可以無咎至六四入坎體而將近乎險矣故衣袽終日之戒更加謹焉九五與六二相應各處一卦之中但九五以剛居剛而處尊又當險陷之中六二則以柔居柔而處卑又為文明之主故五雖尊而不能如二之受福也至上六則濡首而無可救矣凡人警戒于事前而懈弛于事後聖人于既濟之後而兢兢如此所謂人不躓于山而躓于垤也易之垂訓皆持盈保泰之道于泰發平陂之義于豐著見斗之象于既濟列衣袽之戒此聖人作易之大旨也未濟未濟火上水下在上者炎而益上在下者潤而愈下其性不相接且六爻剛柔皆不得位是以謂之未濟以六爻言之下卦坎體陽陷于隂之中故初則濡其尾二則曵其輪三則征凶又當未濟之時皆不能前進之象也上卦離體一隂麗于二陽之間未濟者至此而將濟矣故四五皆曰貞吉上九亦曰無咎五以其為離之體又居尊位下應于二故曰君子之光既濟未濟之初皆曰濡尾上皆曰濡首者以畫卦言之則為初為終以卦體言之則上為首初為尾故四爻所係之辭皆同也狐涉水而多疑故二卦皆取于狐濡尾濡首皆指狐為象也人之涉世也能如狐之慎重不輕則亦庶乎無咎矣故取為象焉上經以乾坤為首天地也下經以咸恆為首少男少女長男長女也上經以坎離終水火之體也下經以既濟未濟終水火之交也天地男女水火萬物萬事之權輿易之樞鑰在焉故以此始終之萬象萬變咸囊括于其中矣易經衷論卷下
